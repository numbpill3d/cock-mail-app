    drawMailboxes = async (mailboxes,root) => {
        if(!mailboxes) mailboxes = await this.imap.getRootMailboxes();

        const sorted_keys = await this.sortMailboxes(mailboxes,root);

        for(const mailbox_name of sorted_keys) {
            const mailbox = this.mailboxes[mailbox_name];
            if(!mailbox) continue;
            const parent = await this.getParent(mailbox.mailbox);
            const list = parent.querySelector('.mailbox_list');
            const link = mailbox.querySelector(':scope > .mailbox_name');

            list.appendChild(mailbox);

            if(mailbox.mailbox.flags.includes('\\NonExistent') || mailbox.mailbox.flags.includes('\\Noselect')) {
                link.classList.add('disabled');
                link.onclick = null;
            } else {
                link.classList.remove('disabled');
                link.onclick = this.onClickMailbox.bind(this,mailbox.mailbox.mailbox);
            }

            const children = mailbox.mailbox.getChildren();

            if(children.length) {
                await this.drawMailboxes(children,mailbox.mailbox.mailbox);
            }
        }
    }

    async drawMailboxInfo(mailbox,el,oldunread) {
        const unread = el.querySelector(':scope > .unread');
        unread.innerHTML = parseInt(mailbox.unseen) || '';
        if(mailbox.unseen && mailbox.unseen > oldunread) {
            await notification(mailbox.mailbox);
        }
    }

    async sortMailboxes(mailboxes,root='$$cock-mail-root') {
        if(root === null) root='$$cock-mail-root';

        const mailbox_keys = mailboxes instanceof Array
            ? mailboxes.map(a => a.mailbox || a)
            : Object.keys(mailboxes);

        var sort_order = await window.AccountSettings.storage.get('mailboxes',root);
        if(sort_order && sort_order.length) {
            if(mailbox_keys.length) {
                sort_order = [ ...new Set([
                    ...sort_order
                        .filter(a => mailbox_keys.includes(a)),
                    ...mailbox_keys.filter(a => !sort_order.includes(a))
                    ])
                ];
            }

        } else {
            sort_order = [ ...new Set([
                ...[
                    this.imap.inbox,
                    this.imap.junk,
                    this.imap.trash,
                    this.imap.drafts,
                    this.imap.sent,
                    this.imap.archive
                ],
                ...mailbox_keys
            ])].filter(Boolean).filter(a => mailbox_keys.includes(a));
        }

        this.mailboxOrder[root] = sort_order;

        //await window.AccountSettings.storage.put('mailboxes',root,sort_order);
        return sort_order;
    }

    isMailboxUsable(mailbox_name) {
        const mailboxes = this.imap.mailboxes;
        const mailbox = mailboxes[mailbox_name];

        if(!mailbox) return false;

        return !(mailbox.flags.includes("\\Noselect") || mailbox.flags.includes("\\NonExistent"));
    }

    onClickManageMailboxes = async () => {
        window.MailboxManageView = new _MailboxManageView();
        await window.MailboxManageView.open();
    }

    onClickMailbox = async (mailbox) => {
        await this.openMailbox(mailbox);
    }

    async openMailbox(mailbox_name) {
        const mailbox = this.imap.mailboxes[mailbox_name];

        const old_mailbox = window.MailboxView;

        window.MailboxView = new _MailboxView(mailbox,window.MessageView?.el);
        old_mailbox?.close();
        await window.MailboxView.open();
        await this.drawMailboxInfo(mailbox,this.mailboxes[mailbox.mailbox]);
    }
}

class _MailboxView extends View {
    constructor(mailbox,el_before) {
        //super('mailbox',window.AccountView?.el);
        super('mailbox',el_before);

        this.mailbox = mailbox;
        this.mailbox.onload = this.draw.bind(this);
        this.mailbox.onfetch = this.buildMessage;
        this.mailbox.onvanished = this.deleteMessages;

        this.messages = {};
        this.sortedMessages = [];

        this.sortMethod = 'uid';
        this.sortDirection = 'desc';

        this.lastFetch = 0;

        this.updateCount = 500; // When fetching mail, how often to update message count
        this.updateCounti = 1; // iterator

        this.el.selectall?.addEventListener('click', this.onClickSelectAll);
        this.el.refresh?.addEventListener('click', this.refresh);
        this.el.rebuild?.addEventListener('click', this.rebuild);

        this.el.cancel?.addEventListener('click',this.onClickCancel);

        this.addEventListener('mailbox-reload', this.draw);
        this.addEventListener('mailboxes-changed', this.drawMessageControls);

        this.selectedMessage = null;

        this.messageQueue = [];

        this.drawMessageCountTimeout = 100;
        //this.drawMessageCountTimeout = Math.max(100,this.mailbox.imap.latency);
        this._drawMessageCountTimeout = null;

        this.drawMessagesTimeout = 100;
        //this.drawMessagesTimeout = Math.max(100,this.mailbox.imap.latency);
        this._drawMessagesTimeout = null;

        this.drawMessageUpdatesTimeout = 100;
        //this.drawMessageUpdatesTimeout = Math.max(100,this.mailbox.imap.latency);
        this._drawMessageUpdatesTimeout = null;
    }

    async open() {
        try {
            set_status(`Loading ${this.mailbox.mailbox}`, "LOAD");
            this.el.mailbox_status.innerText = 'Loading...';

            await this.draw();
            this.show();
            await paint();

            await this.load();

            await set_status("OK");

            if(!window.MessageView) {
                const message_keys = Object.keys(this.mailbox.messages);

                if(message_keys.length) {
                    const most_recent_message = this.mailbox.messages[message_keys.pop()];
                    /*await*/ this.openMessage(most_recent_message.uid);
                }
            }

            await this.mailbox.imap.notify();
        } catch(e) {
            await set_status("ERR",null,e);
            await this.close();
            return;
        }
    }

    async load() {
        const message_keys = Object.keys(this.mailbox.messages);
        if(message_keys.length) {
            var i = 1;
            for(const uid of message_keys) {
                await this.buildMessage(this.mailbox.messages[uid],0);
                i++;
            }
        } else {
            const localMessages = this.mailbox.loadFromStorage();

            var message = null;
            var i = 1;
            while(message = (await localMessages.next())?.value) {
                await this.buildMessage(message,0);
                i++;
            }
        }

        await this.drawMessages();

        await this.mailbox.load();

        this.el.mailbox_status.innerText = Object.keys(this.messages).length
            ? ''
            : '(no messages)';
    }

    draw = async () => {
        const message_keys = Object.keys(this.mailbox.messages);

        this.el.querySelectorAll('.mailbox_name').forEach(e => {
            e.innerText = this.mailbox.getShortName();
        });

        if(message_keys.length) {
            this.el.querySelectorAll('.mailbox_controls .selectall').forEach(e => e.classList.remove('hidden'));
        } else {
            this.el.querySelectorAll('.mailbox_controls .selectall').forEach(e => e.classList.remove('add'));
        }

        await this.drawMessageControls();
    }

    // Builds a mailbox message list item
    // when_draw: 0 (never), 1 (immediately), 2 (after timer)
    buildMessage = async (message,when_draw=2) => {
        this.lastFetch = Date.now();

        const existing = await this.getMessageByUID(message.uid);

        if(existing) {
            await this.queueMessageUpdate(message);
        } else {
            const entry = template('mailbox-message');

            entry.uid = message.uid;
            entry.message = message;

            entry.from.innerText = ( decodeMIMEWords(message.headers.get('from','one'), false) || "(blank)" );
            entry.date.innerText = ( decodeDate(message.headers.get('date','one')) || "(blank)" );
            entry.checkbox.onpointerdown = e => e.stopPropagation();
            entry.checkbox.onchange = this.drawMessageControls;
            entry.onpointerdown = this.onClickMessage;

            this.messages[parseInt(message.uid)] = entry;

            await this.updateMessage(message);

            if(when_draw === 1) this.drawMessages();
            else if(when_draw === 2) await this.startDrawMessagesTimeout();
            await this.startDrawMessageCountTimeout();
        }
    }

    async queueMessageUpdate(message) {
        this.messageQueue.push(message);
        this.startDrawMessageUpdatesTimeout();
        await this.startDrawMessageCountTimeout();
    }

    startDrawMessageUpdatesTimeout() {
        if(!this._drawMessageUpdatesTimeout)
            this._drawMessageUpdatesTimeout = window.setTimeout(this.pollDrawMessageUpdatesTimeout,this.drawMessageUpdatesTimeout);
    }

    pollDrawMessageUpdatesTimeout = async () => {
        this._drawMessageUpdatesTimeout = null;
        if(Date.now() - this.lastFetch > this.drawMessageUpdatesTimeout)
            await this.drawMessageUpdates();
        else
            await this.startDrawMessageUpdatesTimeout();
    }

    async drawMessageUpdates() {
        for(const message of this.messageQueue) {
            await this.updateMessage(message);
        }
        this.messageQueue = [];
    }

    async updateMessage(message) {
        const el = this.getMessageByUID(message.uid);

        el.subject.innerText = (message.flags.includes('\\Flagged') ? '🚩 ' : '')
            + (message.flags.includes('\\Answered') ? '↪ ' : '')
            + (message.flags.includes('$Forwarded') ? '➡️ ' : '')
            + decodeMIMEWords(message.headers.get('subject','one'), false) || "(no subject)";

        el.dataset.flags = escapeHtml(message.flags.join(' '),'_');
        message.flags.filter(Boolean).forEach(e => el.classList.add(escapeHtml(e,'_')));

        if(this.selectedMessage === message.uid) {
            el.setAttribute('data-open', true);
        }

        await this.startDrawMessageCountTimeout();
    }

    async startDrawMessagesTimeout() {
        if(!this._drawMessagesTimeout)
            this._drawMessagesTimeout = window.setTimeout(this.pollDrawMessagesTimeout,this.drawMessagesTimeout);
    }

    pollDrawMessagesTimeout = async () => {
        this._drawMessagesTimeout = null;
        if(Date.now() - this.lastFetch > this.drawMessagesTimeout)
            await this.drawMessages();
        else
            await this.startDrawMessagesTimeout();
    }

    drawMessages = async () => {
        if(this._drawMessagesTimeout) {
            window.clearTimeout(this._drawMessagesTimeout);
            this._drawMessagesTimeout = null;
        }

        this.el.message_list.replaceChildren(...this.sortMessages().map(a => this.messages[a]));

        await paint();
    }

    stopDrawMessageCountTimeout() {
        if(this._drawMessageCountTimeout) {
            window.clearTimeout(this._drawMessageCountTimeout);
            this._drawMessageCountTimeout = null;
        }
    }

    async startDrawMessageCountTimeout() {
        if(this.updateCounti % this.updateCount === 0) {
            await this.drawMessageCount();
            this.updateCounti = 1;
        } else {
            this.updateCounti++;
        }

        if(!this._drawMessageCountTimeout)
            this._drawMessageCountTimeout = window.setTimeout(this.pollDrawMessageCount,this.drawMessageCountTimeout);
    }

    pollDrawMessageCount = async () => {
        this._drawMessageCountTimeout = null;

        if(Date.now() - this.lastFetch > this.drawMessageCountTimeout)
            await this.drawMessageCount();
        else
            await this.startDrawMessageCountTimeout();
    }

    sortMessages(method=this.sortMethod,direction=this.sortDirection) {
        const sort_function = this.getSortFunction(method);
        const sorted = Object.keys(this.messages)
            .map(a => parseInt(a))
            .sort(sort_function);

        if(direction === 'desc') sorted.reverse();

        return sorted;
    }

    getSortFunction(method) {
        switch(method) {
            case "uid":
                return this.sortByUID;
                break;
        }
    }

    sortByUID = (a,b) => {
        a = parseInt(a); b = parseInt(b);
        return a-b;
    }

    drawMessageCount = async () => {
        this.stopDrawMessageCountTimeout();

        const message_count = Object.keys(this.messages).length;
        const message_count_unread = this.mailbox.getFlaggedUIDs('\\Seen',true).length;
        const message_count_flagged = this.mailbox.getFlaggedUIDs('\\Flagged').length;
        const s = message_count !== 1 ? 's' : '';

        var string = '(';

        if(message_count_flagged) {
            string += `${message_count_flagged} flagged, `;
        }

        if(message_count_unread) {
            if(message_count_unread == message_count) {
                string += `${message_count_unread} unread message${s}`;
            }
            else {
                string += `${message_count_unread} unread, ${message_count} message${s}`;
            }
        } else {
            string += `${message_count} message${s}`;
        }

        string += ')';

        if(this.el.message_count) this.el.message_count.innerText = string;

        await paint();
    }

    drawMessageControls = async () => {
        const uids = this.getCheckedMessages();

        if(uids.length) {
            this.el.message_controls?.classList.remove('hidden');
            this.el.selectedcount.innerText = `(${uids.length} selected)`;
        } else {
            this.el.message_controls?.classList.add('hidden');
        }

        for(const el of [...this.el.copy.children].slice(1)) el.remove();
        for(const el of [...this.el.move.children].slice(1)) el.remove();

        this.el.mark.onchange = this.onClickMark.bind(null,uids);
        this.el.copy.onchange = this.onClickCopy.bind(null,uids);
        this.el.move.onchange = this.onClickMove.bind(null,uids);

        await this.drawMailboxSelect(this.el.copy,window.AccountView.imap.getRootMailboxes());
        await this.drawMailboxSelect(this.el.move,window.AccountView.imap.getRootMailboxes());
    }

    async drawMailboxSelect(el,mailboxes,root='$$cock-mail-root') {
        for(const mailbox_name of await window.AccountView.sortMailboxes(mailboxes,root)) {
            const mailbox = this.mailbox.imap.mailboxes[mailbox_name];
            const item = template('mailbox-select');

            if(mailbox && !window.AccountView.isMailboxUsable(mailbox.mailbox))
                item.setAttribute('disabled',true);

            item.innerText = mailbox ? mailbox.mailbox : '';
            item.value = mailbox ? mailbox.mailbox : '';

            el.appendChild(item);

            const children = mailbox.getChildren();

            if(children.length)
                await this.drawMailboxSelect(el,children,mailbox.mailbox);
        }
    }

    onClickMark = async (uids,e) => {
        const selected = e.target.options[e.target.selectedIndex];
        e.target.value=0;

        if(!Array.isArray(uids))
            uids = [ uids ];

        const flag = selected.getAttribute('data-flag');
        const action = selected.getAttribute('data-action');

        if(flag === "\\Deleted") {
            if(!confirm(`Permanently delete ${uids.length} message${uids.length === 1 ? '' : 's'}?`)) return;
            try {
                await set_status(`Deleting ${uids.length} message${uids.length === 1 ? '' : 's'}`, 'LOAD');
                await this.mailbox.deleteMessages(uids);
                await set_status("OK");
            } catch(e) {
                await set_status("ERR",null,e);
                return;
            }
            window.dispatchEvent(new CustomEvent('message-deleted',{detail: {uids: uids, action: 'deleted'}}));
        } else {
            try {
                await set_status(`Marking ${uids.length} message${uids.length === 1 ? '' : 's'}`, 'LOAD');
                await this.mailbox.markMessages(uids,action,flag);
                for(const uid of uids) await this.updateMessage(this.mailbox.messages[uid]);
                await this.deselect(uids);
                await set_status("OK");
            } catch(e) {
                await set_status("ERR",null,e);
                return;
            }
            window.dispatchEvent(new CustomEvent('message-updated',{detail: {uids: uids, updated: 'flags', action: action, flags: [flag]}}));
        }

        await this.mailbox.updateInfo();
        //window.dispatchEvent(new CustomEvent("mailbox-reload"));
    }

    onClickCopy = async (uids,e) => {
        const selected = e.target.options[e.target.selectedIndex];
        e.target.value=0;

        if(!Array.isArray(uids))
            uids = [ uids ];

        const mailbox = selected.value;

        try {
            await set_status(`Copying ${uids.length} message${uids.length === 1 ? '' : 's'} to ${mailbox}`, 'LOAD');
            await this.mailbox.copyMessages(uids,mailbox);
            await this.deselect(uids);
            await set_status("OK");
        } catch(e) {
            await set_status("ERR",null,e);
            return;
        }
    }

    onClickMove = async (uids,e) => {
        const selected = e.target.options[e.target.selectedIndex];
        e.target.value=0;

        if(!Array.isArray(uids))
            uids = [ uids ];

        const mailbox = selected.value;

        try {
            await set_status(`Moving ${uids.length} message${uids.length === 1 ? '' : 's'} to ${mailbox}`, 'LOAD');
            await this.mailbox.moveMessages(uids,mailbox);
            await set_status("OK");
        } catch(e) {
            await set_status("ERR",null,e);
            return;
        }

        await this.mailbox.updateInfo();
        window.dispatchEvent(new CustomEvent('message-deleted',{detail: {uids: uids, action: 'moved'}}));
        window.dispatchEvent(new CustomEvent("mailbox-reload"));
    }

    indicateSelectedMessage() {
        this.el.querySelectorAll('.message_list .message').forEach(e => {
            e.removeAttribute('data-open');
        });

        const open_mailbox_message = this.getMessageByUID(this.selectedMessage);

        if(open_mailbox_message)
            open_mailbox_message.setAttribute('data-open',true);
    }

    rebuild = async () => {
        await set_status(`Rebuilding ${this.mailbox.mailbox}`, "LOAD");
        //for(const message of Object.values(this.messages)) message.remove();
        this.messages = {};
        this.mailbox.clear();
        await this.mailbox.deleteAllMessages();
        await this.load();
        set_status(`Rebuilding ${this.mailbox.mailbox}... Done!`, "OK");
        return false;
    }

    refresh = async () => {
        await set_status(`Refreshing ${this.mailbox.mailbox}`, "LOAD");
        await this.mailbox.load();
        await set_status("OK");
    }

    onClickSelectAll = async () => {
        this.el.querySelectorAll('.message_list .message input[type=checkbox]').forEach(e => { e.checked = true; });
        this.drawMessageControls();
    }

    async deselect(uids) {
        const els = uids
            ? uids.map(a => this.getMessageByUID(a))
            : Object.values(this.messages);

        for(const el of els) {
            el.querySelector('input[type=checkbox]').checked = false;
        }

        await this.drawMessageControls();
    }

    onClickMessage = async (e) => {
        e.preventDefault();
        const target_message = e.target.closest('.message');
        const message = target_message.message;
        if(e.ctrlKey) {
            const checkbox = target_message.checkbox;
            checkbox.checked = !checkbox.checked;
            this.drawMessageControls();
        } else if(e.shiftKey) {
            window.getSelection().removeAllRanges();
            const all_messages = [...this.el.message_list.children];

            const message_a = this.messages[this.selectedMessage] || all_messages[0];
            const message_b = e.target.closest('.message');

            const index_a = all_messages.indexOf(message_a);
            const index_b = all_messages.indexOf(message_b);

            const [target_a, target_b] = index_a > index_b
                ? [index_b, index_a]
                : [index_a, index_b];

            const to_select = all_messages.filter((a,p) => p >= target_a && p <= target_b);

            for(const el of to_select) el.checkbox.checked = !el.checkbox.checked;

            this.drawMessageControls();
        } else {
            await this.openMessage(message.uid);
        }

    }

    onClickMessageCheckbox(e, uid) {
        e.stopPropagation();
    }

    async openMessage(uid) {
        this.selectedMessage = uid;

        this.indicateSelectedMessage();

        const message = this.mailbox.messages[uid];

        const setRead = (!message.flags.includes('\\Seen'));

        window.MessageView?.close();
        window.MessageView = new _MessageView(message, this.mailbox, this);
        await window.MessageView.open();

        await this.updateMessage(message);

        if(setRead)
            await this.mailbox.markMessages(message.uid,'add','\\Seen');

        await this.mailbox.updateInfo();
    }

    onClickCancel = async () => {
        await this.deselect();
    }

    deleteMessages = async (uids) => {
        if(!Array.isArray(uids)) uids = [uids];
        for(const uid of uids) {
            if(uid in this.messages) {
                this.messages[uid]?.remove();
                delete this.messages[uid];
            }
        }
        await this.drawMessageControls();
        await this.drawMessageCount();
    }

    getMessageByUID(uid) {
        return this.messages[parseInt(uid)];
    }

    getCheckedMessages() {
        const uids = [];
        for(const el of this.el.querySelectorAll(".message input:checked")) {
            if(!uids.includes(el.parentElement.uid))
                uids.push(el.parentElement.uid);
        }
        return uids;
    }
}

class _MessageView extends View {
    constructor(message, mailbox,mailboxView) {
        super('message');
        this.el.scrollTop = 0;

        this.message = message;
        this.mailbox = mailbox;
        this.mailboxView = mailboxView;

        this.el.querySelectorAll('.reply').forEach(e => e.addEventListener('click', this.onClickReply.bind(this)));
        this.el.querySelectorAll('.replyall').forEach(e => e.addEventListener('click', this.onClickReplyAll.bind(this)));
        this.el.querySelectorAll('.replylist').forEach(e => e.addEventListener('click', this.onClickReplyList.bind(this)));
        this.el.querySelectorAll('.forward').forEach(e => e.addEventListener('click', this.onClickForward.bind(this)));

        this.el.querySelectorAll('.mailbox-list option:not(.title)').forEach(e => e.remove());
        this.el.querySelectorAll('.mark').forEach(e => e.onchange = e => {
            if(this.mailbox.mailbox !== this.mailbox.imap.selected.mailbox) {
                const selected = e.target.options[e.target.selectedIndex];
                e.target.value=0;
                alert(`Mailbox ${this.mailbox.mailbox} is not currently open, so I can't do that.`);
                return;
            }
            this.mailboxView.onClickMark(message.uid,e);
        });
        this.el.querySelectorAll('.copy').forEach(e => {
            this.mailboxView.drawMailboxSelect(e,window.AccountView.imap.getRootMailboxes());
            e.onchange = e => {
                if(this.mailbox.mailbox !== this.mailbox.imap.selected.mailbox) {
                    const selected = e.target.options[e.target.selectedIndex];
                    e.target.value=0;
                    alert(`Mailbox ${this.mailbox.mailbox} is not currently open, so I can't do that.`);
                    return;
                }
                this.mailboxView.onClickCopy(message.uid,e);
            }
        });
        this.el.querySelectorAll('.move').forEach(e => {
            this.mailboxView.drawMailboxSelect(e,window.AccountView.imap.getRootMailboxes());
            e.onchange = e => {
                if(this.mailbox.mailbox !== this.mailbox.imap.selected.mailbox) {
                    const selected = e.target.options[e.target.selectedIndex];
                    e.target.value=0;
                    alert(`Mailbox ${this.mailbox.mailbox} is not currently open, so I can't do that.`);
                    return;
                }
                this.mailboxView.onClickMove(message.uid,e);
            }
        });

        this.el.querySelectorAll('.more').forEach(e => {
            e.onchange = e => {
                const action = e.target.value;
                e.target.value=0;
                switch(action) {
                    case "toggleheaders":
                        this.toggleHeaders();
                        break;
                    case "viewsource":
                        this.viewSource();
                        break;
                    case "download":
                        this.download();
                        break;
                }
            }
        });

        this.addEventListener('message-deleted', e => {
            if(e.detail.uids.includes(this.message.uid)) {
                this.delete('(' + e.detail.action + ')');
            }
        });

        this.addEventListener('mailboxes-changed', e => {
            this.el.querySelectorAll('.mailbox-list option:not(.title)').forEach(e => e.remove());
            this.el.querySelectorAll('.copy').forEach(e => {
                this.mailboxView.drawMailboxSelect(e,window.AccountView.imap.getRootMailboxes());
            });
            this.el.querySelectorAll('.move').forEach(e => {
                this.mailboxView.drawMailboxSelect(e,window.AccountView.imap.getRootMailboxes());
            });
        });
    }

    async open() {
        try {
            await set_status(`Loading message ${this.message.uid}`, "LOAD");
            await this.message.addFlags('\\Seen');
            await super.open();
            await set_status("OK");
        } catch(e) {
            await set_status("ERR",null,e);
            return;
        }
    }

    async close() {
        super.close();
        await this.message.close();
    }

    // Welcome to the fun zone
    async draw() {
        if(!Object.keys(this.message.headers).length) {
            throw ["Error loading message!", this.message];
            return;
        }

        if(this.mailbox.mailbox === this.mailbox.imap.trash) {
            this.el.querySelectorAll('.movetrash').forEach(e => e.classList.add('hidden'));
        }

        const message_el = template('message-message');
        this.el.append(message_el);

        //if(!this.message.loaded) {
        //    await this.message.loadMessage();
        //}

        await this.drawMessage(this.message,message_el);

        // Fetching the body

    async drawMessage(message, el) {
        el.querySelectorAll('.headers .subject').forEach(e => {
            e.innerText = decodeMIMEWords(message.headers.get('subject','one'), false) || "(no subject)";
        });

        el.querySelectorAll('.headers .from').forEach(e => {
            e.innerText = (decodeMIMEWords(message.headers.get('from','one'), false) || "(blank)");
        });

        el.querySelectorAll('.headers .to').forEach(e => {
            e.innerText = (decodeMIMEWords(message.headers.get('to','join'), false) || "(blank)");
        });

        if(message.headers.get('cc')) {
            el.querySelectorAll('.headers .cc').forEach(e => {
                    e.innerText = (decodeMIMEWords(message.headers.get('cc','join'), false) || "(blank)");
            });
            el.querySelectorAll('.headers .cc_header').forEach(e => e.classList.remove('hidden'));
        } else {
            el.querySelectorAll('.headers .cc_header').forEach(e => e.classList.add('hidden'));
        }

        if(message.headers.get('bcc')) {
            el.querySelectorAll('.headers .bcc').forEach(e => {
                    e.innerText = (decodeMIMEWords(message.headers.get('bcc','join'), false) || "(blank)");
            });
            el.querySelectorAll('.headers .bcc_header').forEach(e => e.classList.remove('hidden'));
        } else {
            el.querySelectorAll('.headers .bcc_header').forEach(e => e.classList.add('hidden'));
        }

        el.querySelectorAll('.headers .date').forEach(e => {
            e.innerText = ( decodeDate(message.headers.get('date','one'), true) || "(blank)" );
        });

        if(message.raw_headers && message.raw_headers.length) {
            el.querySelectorAll('.raw_headers').forEach(e => {
                e.innerText = message.raw_headers.join("\r\n");
            });
        }

        if(message.body)
            el.querySelectorAll('.loading').forEach(e => e.remove());

        if(message.inline.length) {
            el.querySelectorAll(':scope > .body').forEach(e => {e.innerHTML = null;});
            for(const inline of message.inline) {
                const t = template('message-inline');
                await this.drawMIMEBodyPart(inline,t,false);
                el.querySelectorAll(':scope > .body').forEach(e => {
                    e.append(t);
                });
            }
        }

        if(message.attachments.length) {
            el.querySelectorAll(':scope > .attachments > .attachment_list').forEach(e => {e.innerHTML = null;});
            el.querySelectorAll('.attachments').forEach(e => e.classList.remove('hidden'));
            for(const attachment of message.attachments) {
                const t = template('message-attachment');
                await this.drawMIMEBodyPart(attachment,t,true);
                el.querySelectorAll(':scope > .attachments >  .attachment_list').forEach(e => {
                    e.append(t);
                });
            }
        } else {
            el.querySelectorAll('.attachments').forEach(e => e.classList.add('hidden'));
        }
    }

    async createBlob(body_part) {
        const [ content_type, content_subtype ] = body_part.content_type
            ? [body_part.content_type, body_part.content_subtype ]
            : [ 'text', 'plain'];

        var blobType = content_type + '/' + content_subtype;
        var blobData = body_part.body;

        switch(content_type) {
            case "application":
                blobType = 'application/octet-stream';
                break;
            case "text":
                switch(content_subtype) {
                    case "html":
                        blobType = 'application/octet-stream';
                        blobData = body_part.raw_html;
                        break;
                    default:
                        if(content_subtype.match(/xml/)) {
                            blobType = 'application/octet-stream';
                        }else if(content_subtype.match(/html/)) {
                            blobType = 'application/octet-stream';
                        }else if(content_subtype.match(/svg/)) {
                            blobType = 'application/octet-stream';
                        }
                        break;
                }
            default:
                if(content_subtype.match(/xml/)) {
                    blobType = 'application/octet-stream';
                }else if(content_subtype.match(/html/)) {
                    blobType = 'application/octet-stream';
                }else if(content_subtype.match(/svg/)) {
                    blobType = 'application/octet-stream';
                }
                break;
        }
        const blob = new Blob([blobData], { type: blobType });
        const blobURL = URL.createObjectURL(blob);
        this.message.blobURLs.push(blobURL);

        return { blob, blobURL };
    }

    async drawMIMEBodyPart(body_part,el,brief=false) {
        var target = el;
        const { blob, blobURL } = await this.createBlob(body_part);

        const [ content_type, content_subtype ] = body_part.content_type
            ? [body_part.content_type, body_part.content_subtype ]
            : [ 'text', 'plain'];

        // Display Type, Filename, and Size
        el.querySelectorAll('.type').forEach(e => {
            e.innerText = content_type + '/' + content_subtype;
        });

        if(body_part.filename) {
            el.querySelectorAll('.filename').forEach(e => {
                e.innerText = body_part.filename;
            });
        }

        el.querySelectorAll('.attachmentsize').forEach(e => {
            e.innerText = decodeSize(blob.size);
        });

        el.querySelectorAll('.download').forEach(e => {
            e.download = body_part.filename;
            e.href = blobURL;
        });

        el.querySelectorAll('.view').forEach(e => {
            if(window.CockmailSettings.renderMedia) {
                e.addEventListener('click', e => {
                    e.target.parentElement.querySelector('.content').classList.remove('hidden');
                    e.target.remove();
                });
            } else {
                e.classList.add('hidden');
            }
        });

        var display_view = true;

        // Display the object
        el.querySelectorAll('.content').forEach(async (e) => {
            switch(content_type) {
                case "application":
                    if(['7bit','8bit',null].includes(body_part.content_transfer_encoding)) {
                        e.innerText = body_part.body;
                    } else {
                        e.innerText += "Cock-mail doesn't know how to display this type!";
                        display_view = false;
                    }
                    break;
                case "video":
                    if(window.CockmailSettings.renderMedia) {
                        const video = template('message-video');
                        video.src = blobURL;
                        video.setAttribute('controls','true');
                        e.appendChild(video);
                    } else {
                        const content = template('message-text');
                        content.innerHTML = "[unrendered media]";
                        e.appendChild(content);
                    }
                    break;
                case "image":
                    if(window.CockmailSettings.renderMedia) {
                        const image = template('message-image');
                        image.src = blobURL;
                        e.appendChild(image);
                    } else {
                        const content = template('message-text');
                        content.innerHTML = "[unrendered media]";
                        e.appendChild(content);
                    }
                    break;
                case "message":
                    const message_el = template('message-message');

                    await this.drawMessage(body_part.message, message_el);

                    e.appendChild(message_el);
                    break;
                case "text":
                default:
                    const content = template('message-text');

                    switch(content_subtype) {
                        case "html":
                            const converted = document.createElement('p');
                            converted.innerText = "Converted from HTML";
                            content.appendChild(converted);
                            const link_keys = Object.keys(body_part.links);
                            if(link_keys.length > 0) {
                                const links_h = document.createTextNode("Links in this e-mail:");
                                content.appendChild(links_h);
                                const ul = document.createElement('ul');
                                for(const i of link_keys) {
                                    const link = body_part.links[i];
                                    const li = document.createElement('li');
                                    li.innerText = "[" + i + "]: " + link;
                                    ul.appendChild(li);
                                }
                                content.appendChild(ul);
                            }
                            content.appendChild(document.createTextNode(body_part.body));
                            break;
                        case "plain":
                        default:
                            content.innerText = body_part.body;
                            break;

                    }
                    e.appendChild(content);
                    break;
            }
        });

        if(!display_view) {
            el.querySelectorAll('.view').forEach(e => e.classList.add('hidden'));
        }
    }

    async delete(message="(deleted)") {
        this.el.innerText = message;
    }

    async toggleHeaders() {
        const el = this.el.querySelector('.raw_headers');
        if(el.classList.contains('hidden'))
            el.classList.remove('hidden');
        else
            el.classList.add('hidden');
    }

    async viewSource() {
        const el = this.el.querySelector('.raw_body');
        this.el.querySelector('.raw_headers').classList.add('hidden');
        this.el.querySelector('.body').classList.add('hidden');
        this.el.querySelector('.attachments').classList.add('hidden');
        el.classList.remove('hidden');

        el.innerText = this.message.message.join('\r\n');
    }

    async download() {
        const a = document.createElement('a');
        a.download = this.message.uid + '-' + decodeMIMEWords(this.message.headers.get('from','one'),false) + '-' + (decodeMIMEWords(this.message.headers.get('subject','one'),false) || '(no subject)') + '.eml';
        const blob_url = URL.createObjectURL(this.message.blob);
        this.message.blobURLs.push(blob_url);
        a.href = blob_url;
        a.click();
    }


    async splitMessage(lines) {
        const blank = lines.indexOf("");
        if(blank === -1)
            return [message, null];
        const headers = lines.slice(0,blank);
        const body = lines.slice(blank);

        return [ headers, body ];
    }
}

class _ComposeView extends View {
    constructor(message = new Message(),allowsignature=true) {
        super('compose');

        message.headers.set('MIME-Version','1.0');
        message.mime = true;
        this.message = message;
        this.from = window.AccountView?.imap.username;
        this.rcpts = [];
        this.bodypos = 0;
        this.allowsignature = true;

        this.el.querySelectorAll('.send').forEach(e => e.addEventListener('click', async () => await this.onClickSend.call(this)));
        this.el.querySelectorAll('.cancel').forEach(e => e.addEventListener('click', async () => await this.onClickCancel.call(this)));

        this.el.addEventListener('keyup', (async (e) => await this.onKeyUp.call(this,e)));
        this.el.querySelectorAll('input').forEach(e => e.addEventListener('blur', (async () => await this.setMessageFields.call(this))));
        this.el.querySelectorAll('textarea').forEach(e => e.addEventListener('blur', (async () => await this.setMessageFields.call(this))));

        this.el.querySelectorAll('input[name=to]').forEach(e => e.addEventListener('blur', (async () => await this.drawRCPTs.call(this))));
        this.el.querySelectorAll('input[name=cc]').forEach(e => e.addEventListener('blur', (async () => await this.drawRCPTs.call(this))));
        this.el.querySelectorAll('input[name=bcc]').forEach(e => e.addEventListener('blur', (async () => await this.drawRCPTs.call(this))));

        this.el.querySelectorAll('input[type=file]').forEach(e => e.addEventListener('change', async (e) => await this.importAttachments.call(this,e.target)));
        this.el.querySelectorAll('.add-attachments').forEach(e => e.addEventListener('click', e => this.el.querySelector('input[type=file]').click()));
    }

    async open() {
        await super.open();
        await window.MessageView?.hide();
        this.el.style.display="inline-block";

        this.el.querySelector('textarea').focus();
        this.el.querySelector('textarea').selectionEnd = this.bodypos;
        if(!(this.message.isreply === true) || window.AccountSettings.replyAt === "top")
            this.el.querySelector('textarea').scrollTop = 0;
    }

    async close() {
        super.close();
        window.MessageView?.show();
    }

    async draw() {
        this.el.querySelectorAll('input[name=from]').forEach(e => {
            if(window.AccountSettings.name)
                e.value = window.AccountSettings.name + ' <' + (this.from || '') + '>';
            else
                e.value = this.from || '';
        });
        this.el.querySelectorAll('input[name=to]').forEach(e => {e.value = this.message.headers.get('to','join') || ''});
        this.el.querySelectorAll('input[name=cc]').forEach(e => {e.value = this.message.headers.get('cc','join') || ''});
        this.el.querySelectorAll('input[name=bcc]').forEach(e => {e.value = this.message.headers.get('bcc','join') || ''});
        this.el.querySelectorAll('input[name=subject]').forEach(e => {e.value = this.message.headers.get('subject','one') || ''});
        this.el.querySelectorAll('textarea[name=body]').forEach(e => {
            if(this.allowsignature && this.message.isreply === true && window.AccountSettings.replyAt === "bottom") {
                if(window.AccountSettings.signature && window.AccountSettings.replySignature === true) {
                    e.value = (this.message.body ? (this.message.body + '\r\n') : '') + '\r\n\r\n' + window.AccountSettings.signature;
                } else {
                    e.value = (this.message.body ? (this.message.body + '\r\n\r\n') : '');
                }
                this.bodypos = this.message.body.replace(/[\r]/g,'').length + 2;
            } else {
                if(this.allowsignature && window.AccountSettings.signature)
                    e.value = '\r\n' + window.AccountSettings.signature + (this.message.body ? ('\r\n\r\n' + this.message.body) : '');
                else {
                    if(this.allowsignature)
                        e.value = this.message.body ? ('\r\n\r\n' + this.message.body) : '';
                    else
                        e.value = this.message.body;
                }
            }
        });

        await this.drawRCPTs();

        await this.drawAttachments();
    }

    async enableMultipart() {
        this.message.content_type = 'multipart';
        this.message.content_subtype = 'mixed';
    }

    async disableMultipart() {
        this.message.content_type = 'text';
        this.message.content_subtype = 'plain';
    }

    async importAttachments(e) {
        if(e.files.length)
            await this.enableMultipart();
        for(const file of e.files) {
            this.message.attachments.push({
                filename: file.name,
                content_type: file.type.split('/')[0],
                content_subtype: file.type.split('/')[1],
                blob: file
            });
        }

        await this.drawAttachments();
    }

    async drawAttachments() {
        this.el.querySelectorAll('.attachments .attachment').forEach(e => e.remove());
        this.el.querySelectorAll('.attachments').forEach(e => {
            for(const attachment_i in this.message.attachments) {
                const attachment = this.message.attachments[attachment_i];
                const entry = template('compose-attachment');
                entry.querySelectorAll('.filename').forEach(e => {e.innerText = attachment.filename});
                entry.querySelectorAll('.type').forEach(e => {e.innerText = attachment.content_type + '/' + attachment.content_subtype});
                entry.querySelectorAll('.size').forEach(e => {e.innerText = decodeSize(attachment.blob.size)});
                entry.querySelectorAll('.delete').forEach(e => e.addEventListener('click',e => (async (e,i) => {
                    this.message.attachments.splice(i,1);
                    e.remove();
                    if(!this.message.attachments.length)
                        await this.disableMultipart();
                }).call(this,entry,attachment_i)));
                e.appendChild(entry);
            }
        });
    }

    async setMessageFields() {
        this.message.headers.set('From',this.el.querySelector('input[name=from]').value);
        this.message.headers.set('To',this.el.querySelector('input[name=to]').value);
        this.message.headers.set('CC',this.el.querySelector('input[name=cc]').value);
        this.message.headers.set('BCC',this.el.querySelector('input[name=bcc]').value);
        this.message.headers.set('Subject',this.el.querySelector('input[name=subject]').value);
        this.message.body = this.el.querySelector('textarea[name=body]').value;

        if(!this.message.headers.get('cc','one')) this.message.headers.delete('cc');
        if(!this.message.headers.get('bcc','one')) this.message.headers.delete('bcc');
    }

    async drawRCPTs() {
        await this.setMessageFields();
        this.rcpts = await this.message.extractRCPTs();
        this.el.querySelector('.rcptcount').innerText = this.rcpts.length;
        this.el.querySelector('.rcptlist').innerText = this.rcpts.join(', ');
    }

    async drawResponse(r,type='load') {
        const rel = this.el.querySelector('.response');
        rel.setAttribute('class','response ' + type);

        var rmsg = 'unknown';

        if(typeof r === "object") {
            if(r instanceof Error) {
                rmsg = `Javascript error: ${r}`;
            } else {
                if(type === 'err') {
                    rmsg = `Error during command:\r\n${r.cmd} ${r.arg || ''}\r\nServer said:\r\n${r.msg}`;
                } else {
                    rmsg = `Server said:\r\n${r.msg}`;
                }
            }
        } else {
            rmsg = r;
        }

        rel.innerText = rmsg;
        rel.style.display = 'block';
    }

    async onKeyUp(e) {
        if(e.key === "Enter" && e.ctrlKey) {
            await this.onClickSend();
            return false;
        }
    }

    async onClickSend() {
        await this.drawRCPTs();
        if(!confirm(`Send this message to ${this.rcpts.length} recipient${this.rcpts.length === 1 ? '' : 's'}?`)) return;

        await this.setMessageFields();

        const username = window.AccountView.imap.username;
        const password = window.knownAccounts[username] || await promptPassword(username);

        if(!password) {
            alert("Refusing to use an empty password!");
        }

        await this.drawResponse('Sending message...');

        const client = new SmtpClient();

        try {
            this.message = await client.send(username,password,this.from,this.message);
        } catch(e) {
            await this.drawResponse(e,'err');
            return;
        }

        await this.drawResponse("Message sent!","success");

        try {
            await set_status("Saving message to Sent", "LOAD");
            await window.AccountView.imap.append(this.message,"Sent",["\\Seen"]);
            await set_status("OK");
        } catch(e) {
            await set_status("ERR",null,e);
            return;
        }

        window.setTimeout(() => this.close(),1000);
    }

    async onClickCancel() {
        if(!confirm("Discard this message?")) return;
        await this.close();
    }
}

class _StorageView extends View {
    constructor() {
        super('prompt');
        this._el = template('storage-prompt');
        this.el.appendChild(this._el);

        this.el.querySelectorAll('.title').forEach(e => {e.innerText = 'Manage Storage'});
        this.el.querySelectorAll('.close').forEach(e => e.addEventListener('click',((e) => {
            this.close();
        }).bind(this)));
        this.el.querySelectorAll('.deleteall').forEach(e => {
            e.addEventListener('click',async (e) => {
                if(!confirm("Really delete ALL local cock-mail storage?")) return;
                for(const db of await indexedDB.databases()) {
                    await indexedDB.deleteDatabase(db.name);
                }
                alert("All storage deleted! Nothing will be stored until you reload the page.");
            });
        });
    }

    async draw() {
        const storageEstimate = await navigator.storage?.estimate();
        if(storageEstimate) {
            this.el.querySelectorAll('.storage').forEach(e => {
                e.classList.remove('hidden');
                e.querySelectorAll('.storageused').forEach(e => {
                    e.innerText = `approximately ${decodeSize(storageEstimate.usage)}/${decodeSize(storageEstimate.quota)}`;
                });
            });
        }

        const globalStorage = [];
        const accountStorage = [];
        const mailboxStorage = [];

        for(const db of await indexedDB.databases()) {
            if(db.name === "cock-mail-global") {
                globalStorage.push(db);
            } else if(db.name.match('/')) {
                mailboxStorage.push(db);
            } else {
                accountStorage.push(db);
            }
        }

        this.el.querySelectorAll('.globalstores .store').forEach(e => e.remove());
        this.el.querySelectorAll('.globalstores').forEach(async (e) => {
            for(const db of globalStorage) {
                e.appendChild(await this.drawStore(db));
            }
        });

        this.el.querySelectorAll('.accountstores .store').forEach(e => e.remove());
        this.el.querySelectorAll('.accountstores').forEach(async (e) => {
            for(const db of accountStorage) {
                e.appendChild(await this.drawStore(db));
            }
        });

        this.el.querySelectorAll('.mailboxstores .store').forEach(e => e.remove());
        this.el.querySelectorAll('.mailboxstores').forEach(async (e) => {
            for(const db of mailboxStorage) {
                e.appendChild(await this.drawStore(db));
            }
        });
    }

    async drawStore(db) {
        const entry = template('storage-store');
        entry.querySelector('.delete').addEventListener('click',(async (e) => {
            if(!confirm(`Really delete local storage named ${db.name}?`)) return;
            await indexedDB.deleteDatabase(db.name);
            this.draw();
        }).bind(this));
        entry.append(' ' + db.name);
        return entry;
    }
}

class _MailboxManageView extends View {

        this.el.appendChild(this._el);

        this.drawQueue = Promise.resolve();

        this.el.querySelectorAll('.title').forEach(e => {e.innerText = 'Manage Mailboxes'});
        this.el.querySelectorAll('.close').forEach(e => e.addEventListener('click',this.close.bind(this)));

        this.el.querySelectorAll('.create').forEach(e => e.addEventListener('click', this.onClickCreate.bind(this)));

        for(const a of ['mailboxes-changed']) {
            this.addEventListener(a, async () => {await this.draw.call(this)});
        }
    }

    async draw() {
        await this.drawQueue;

        const newQueue = this.drawQueue.then(async () => {
            this.mailboxes = window.AccountView.imap.mailboxes;
            this.el.querySelectorAll('.mailbox_list').forEach(e => e.remove());

            const mailboxes = this.el.querySelector('.mailboxes');
            window.second = false;
            await this.drawMailboxes.call(this,this.imap.getRootMailboxes(),mailboxes);
            delete window.second;
        });

        this.drawQueue = newQueue.catch(() => {});

        return newQueue;
    }

    async drawMailboxes(mailboxes,el,root='$$cock-mail-root') {
        const list = template('mailbox-manage-mailbox-list');
        const sorted_keys = await window.AccountView.sortMailboxes(mailboxes,root);
        for(const mailbox_name of sorted_keys) {
            const mailbox = this.mailboxes[mailbox_name];
            const entry = template('mailbox-manage-mailbox');

            if(window.second) entry.classList.add('second');
            else entry.classList.add('first');
            window.second = !window.second;

            if(mailbox.flags.includes('\\NonExistent') || mailbox.flags.includes('\\Noselect')) {
                entry.querySelectorAll('.delete').forEach(e => {e.onclick = null; e.classList.add('disabled');});
                entry.querySelectorAll('.rename').forEach(e => {e.onclick = null; e.classList.add('disabled');});
            } else {
                entry.querySelectorAll('.delete').forEach(e => {e.onclick = this.onClickDelete.bind(this,mailbox.mailbox);e.classList.remove('disabled');});
                entry.querySelectorAll('.rename').forEach(e => {e.onclick = this.onClickRename.bind(this,mailbox.mailbox);e.classList.remove('disabled');});
            }
            entry.querySelectorAll('.moveup').forEach(e => e.addEventListener('click', this.onClickMove.bind(this,mailbox_name,root,'up')));
            entry.querySelectorAll('.movedown').forEach(e => e.addEventListener('click', this.onClickMove.bind(this,mailbox_name,root,'down')));
            entry.querySelectorAll('.mailbox_name').forEach(e =>{
                e.innerText = mailbox.getShortName();
                if(!window.AccountView.isMailboxUsable(mailbox.mailbox))
                    e.classList.add('disabled');
            });

            const children = mailbox.getChildren();

            if(children.length) {
                await this.drawMailboxes(children,entry,mailbox.mailbox);
            }

            list.appendChild(entry);
        }
        el.appendChild(list);
    }

    async onClickCreate() {
        const delimiter = window.AccountView.imap.namespaces.personal[0][1];
        const title = "Create Mailbox";
        const text = `Use "${delimiter}" to delimit mailbox hierarchy. For example, creating a mailbox named "INBOX${delimiter}Cock" will create a folder "Cock" as a subfolder of "INBOX". If the parent folder doesn't exist yet it will be created but that parent folder will be unable to be selected or have messages moved to it.\n\nCommon Special-Use mailbox names include "Trash", "Sent", "Junk", "Drafts", and "Archive"`;

        const mailbox_name = await prompt(title,text);
        if(!mailbox_name) return;

        if(mailbox_name in window.AccountView.imap.mailboxes) {
            const mailbox = window.AccountView.imap.mailboxes[mailbox_name];
            if(window.AccountView.isMailboxUsable(mailbox_name)) {
                alert("Mailbox already exists!");
                return;
            }
        }

        try {
            await set_status(`Creating mailbox ${mailbox_name}`,"LOAD");
            await window.AccountView.imap.create(mailbox_name);
            await set_status("OK");
        } catch(e) {
            await set_status("ERR",null,e);
            return;
        }
    }

    async onClickDelete(mailbox) {
        if(mailbox.toLowerCase() === "inbox") {
            alert("Inbox can't be deleted");
            return;
        }
        if(!confirm(`Really delete mailbox ${mailbox}?\nTHIS WILL DELETE ALL MESSAGES IN THAT MAILBOX!`)) return;

        try {
            await set_status(`Deleting mailbox ${mailbox}`,"LOAD");
            await window.AccountView.imap.delete(mailbox);

            if(window.MailboxView.mailbox.mailbox === mailbox || window.AccountView.imap.isParentOf(mailbox,window.MailboxView.mailbox.mailbox))
                await window.MailboxView.close();

            const storage = new MailboxStorage(window.AccountView.account + '/' + mailbox);
            await storage.init();
            storage.deleteDB(true);
            await set_status("OK");
        } catch(e) {
            await set_status("ERR",null,e);
            return;
        }
    }

    async onClickRename(mailbox) {
        if(mailbox.toLowerCase() === "inbox") {
            alert("Inbox can't be renamed");
            return;
        }
        const delimiter = window.AccountView.imap.namespaces.personal[0][1];
        const title = "Rename Mailbox";
        const text = `Move a mailbox in and out of parent folders by deliminating with "${delimiter}". For example, rename "INBOX${delimiter}Cock" to "Archive${delimiter}.Cock" to move "Cock" into "Archive".`;

        const new_name = await prompt(title,text,mailbox);
        if(!new_name || (new_name === mailbox)) return;

        if(new_name in window.AccountView.imap.mailboxes) {
            const mailbox = window.AccountView.imap.mailboxes[new_name];
            if(window.AccountView.isMailboxUsable(new_name)) {
                alert("Mailbox already exists!");
                return;
            }
        }

        try {
            await set_status(`Renaming mailbox ${mailbox} to ${new_name}`, "LOAD");

            if(window.MailboxView.mailbox.mailbox === mailbox || window.AccountView.imap.isParentOf(mailbox,window.MailboxView.mailbox.mailbox))
                await window.MailboxView.close();

            await window.AccountView.imap.rename(mailbox,new_name);

            await set_status("OK");
        } catch(e) {
            await set_status("ERR",null,e);
            return;
        }
    }

    async onClickMove(mailbox, root, direction) {
        const order = window.AccountView.mailboxOrder[root] || await this.storage.get('mailboxes',root);
        const curpos = order.findIndex(a => a === mailbox);
        if((curpos === 0 && direction === 'up') || (curpos === order.length-1 && direction === 'down')) {
            alert("no");
            return;
        }

        const newpos = (direction === 'up') ? curpos-1 : curpos+1;

        order.splice(curpos,1);

        order.splice(newpos,0,mailbox);

        await this.storage.put('mailboxes',root,order);

        window.dispatchEvent(new CustomEvent("mailboxes-changed"));
    }
}

class _LogsView extends View {
    constructor() {
        super('prompt');
        this.el.classList.add('logs');
        this._el = template('logs-prompt');
        this.el.appendChild(this._el);

        this.el.querySelector('.title').innerText = 'Application Logs';

        this.el.querySelectorAll('.close').forEach(e => e.addEventListener('click',((e) => {
            this.close();
        }).bind(this)));

        this.defaultlevel = LOAD;
        this.defaultlive = true;

        this.verbosity = this.el.querySelector('input[name=verbosity]');
        this.verbosity.min = 0;
        this.verbosity.max = log_levels.length-1;
        this.verbosity.step = 1;

        this.live = this.el.querySelector('#live-logs');
        this.container = this.el.querySelector('.logs-container');
        this.table = this.el.querySelector('table');

        this.verbosity.addEventListener('input',this.onChangeLevel.bind(this));
        this.el.querySelector('.download').addEventListener('click',this.download.bind(this));
        this.el.querySelector('.copy').addEventListener('click',this.copy.bind(this));
        this.el.querySelector('.sendsupport').addEventListener('click',this.sendSupport.bind(this));

        this.verbosity.value = this.defaultlevel;

        this.live.onchange = (e) => {if(e.target.checked) this.draw();}
        this.live.checked = this.defaultlive;

        this.addEventListener('log',this.onLog.bind(this));
    }

    async close() {
        super.close();
        delete window.LogsView;
    }

    async draw() {
        const level = this.verbosity.value;
        const messages = this.getMessages();

        const table = this.el.querySelector('table');

        this.el.querySelector('.verbosity').innerText = log_level_descriptions[level];

        this.el.querySelectorAll('table tr:not(.header)').forEach(a => a.remove());
        for(const message of messages) {
            this.drawLogItem(message,false);
        }

        this.container.scrollTop = this.container.scrollTopMax;
    }

    drawLogItem(message,scroll_down=true) {
        const scrolled_down = scroll_down
            ? this.container.scrollTop === this.container.scrollTopMax
            : false;

        const entry = template('logs-entry');
        entry.classList.add(log_levels[message.level]);
        entry.querySelector('.time').innerText = this.timeFormat(message.date);
        entry.querySelector('.level').innerText = log_levels[message.level];
        entry.querySelector('.source').innerText = message.name;
        const long_entry = message.message.length > 512;
        if(long_entry)
            entry.querySelector('.message').innerText = message.message.slice(0,512) + '...';
        else
            entry.querySelector('.message').innerText = message.message;
        if(message.data || long_entry) {
            const data = entry.querySelector('.data a');
            data.classList.remove('hidden');
            data.onclick = this.devToolsLog.bind(this,message);
        }
        this.table.appendChild(entry);

        if(scrolled_down)
            this.container.scrollTop = this.container.scrollTopMax;
    }

    onLog(e) {
        if(this.live.checked && (e.detail.level <= this.verbosity.value)) {
            this.drawLogItem(e.detail);
        }
    }

    devToolsLog(message) {
        window.temp = message;
        console.info(`${this.timeFormat(message.date)}:`, message);
    }

    async onChangeLevel() {
        await this.draw();
    }

    timeFormat(t) {
        return t.getHours({hour12:false}).toString().padStart(2,'0')
            + ':' + t.getMinutes().toString().padStart(2,'0')
            + ':' + t.getSeconds().toString().padStart(2,'0')
            + '.' + t.getMilliseconds().toString().padStart(3,'0');
    }

    getMessages() {
        const level = this.verbosity.value;
        return level < log_levels.length-1
            ? window.log_messages.filter(a => (a.level <= level))
            : window.log_messages;
    }

    copy() {
        var string = '';
        for(const message of this.getMessages()) {
            string += this.timeFormat(message.date)
                + '\t[' + log_levels[message.level] + ']'
                + '\t[' + message.name + ']'
                + '\t' + message.message + '\n';
        }

        navigator.clipboard.writeText(string);
    }

    async download() {
        const logblob = await this.getBlob();

        const a = document.createElement('a');
        a.download = logblob[0]
        a.href = URL.createObjectURL(logblob[1]);
        a.click();
    }

    async getBlob() {
        const now = new Date();
        const blob_uncompress = new Blob([JSON.stringify(this.getMessages())],{type: 'application/octet-stream'});
        const compression_stream = blob_uncompress.stream().pipeThrough(new CompressionStream('gzip'));
        const compression_response = await new Response(compression_stream);
        const filename = 'cock-mail ' + now.toLocaleTimeString() + '.json.gz';

        return [filename, await compression_response.blob()];
    }

    async sendSupport() {
        const level = this.verbosity.value;

        if(level >= NET) {
            if(!confirm("Log levels NET and above include raw data including messages you sent and downloaded this session. Only IMAP/SMTP passwords are censored. Do you want to do this?")) return;
        }

        var body = `I need help with cock-mail.\r\n\r\nWhat I'm trying to do is:\r\n\r\n\r\nThe error I get is:\r\n\r\n\r\nI attached a logfile with verbosity ${log_levels[level]}.`;

        if(level >= NET) {
            body += " I UNDERSTAND THAT THIS LOG LEVEL INCLUDES NETWORK TRAFFIC FROM THIS SESSION INCLUDING MESSAGES SENT AND RECEIVED, AND THAT ONLY IMAP/SMTP PASSWORDS WERE CENSORED.";
        }

        const logblob = await this.getBlob();

        const message = new Message({
            headers: {
                To: atob(atob('YjJabWFXTnBZV3d0YzNWd2NHOXlkRUJqYjJOckxteHA=')), // not so fast
                Subject: 'Cock-mail support request'
            },
            body: body,
            attachments: [{
                content_type: 'application',
                content_subtype: 'gzip',
                filename: logblob[0],
                blob: logblob[1]
            }]
        });

        window.ComposeView = new _ComposeView(message,false);
        await window.ComposeView.enableMultipart();
        await window.ComposeView.open();
        await this.close();
    }
}
