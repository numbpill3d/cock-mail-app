        this.flags = []; // IMAP flags
        this.headers = new MessageHeaders();
        this.blobURLs = [];

        this.clear();

        for(const key of Object.keys(message_object)) {
            if(key === 'headers') {
                this.headers = new MessageHeaders(message_object[key]);
            } else {
                this[key] = message_object[key];
            }
        }
    }

    clear() {
        this.full = false; // Whether message contains `message` object or just headers/flags
        this.loaded = false; // Message has been fully parsed
        this.needsFetch = false; // MODSEQ increased but FLAGS were not given
        this.message = null; // Raw array of lines comprising an RFC822 message
        this.body = null; // The content of the message
        this.raw_headers = null; // An array containing raw header lines
        this.blob = null; // Once the complete message is loaded this Blob exists
        this.mime = false;
        this.content_type = null;    // (content_type)/ content_subtype
        this.content_subtype = null; //  content_type /(content_subtype)
        this.multipart_boundary = null;
        this.inline = []; // Objects to be displayed inline
        this.attachments = []; // Objects to be shown as attachments
    }

    // ------------------Loaders-----------------

    // Loads a partial or complete RFC822 message and optionally parses MIME
    async loadMessage(message=this.message,loadMime=true) {
        if(message === null)
            throw "there's no message to load!";

        if(typeof message === "string") {
            this.blob = new Blob([message], {type: 'message/rfc822'});
            message = message.split("\r\n");
        } else {
            this.blob = new Blob([message.join("\r\n")], {type: 'message/rfc822'});
        }

        this.message = message;

        [ this.headers, this.body, this.raw_headers ] = await this.splitHeaders(message);

        if(this.body && loadMime) await this.handleMIMEMessage();

        // By default the body is a single inline object
        if( (!this.mime) || (this.inline.length === 0 && this.attachments.length === 0) )
            this.inline = [ {body: this.body} ];

        this.loaded = true;
    }

    // Apply a FETCH object into the message, flagging for update if necessary
    async update(fetch) {
        var changed = false;

        for(const key of Object.keys(fetch)) {
            if(this[key] != fetch[key]) {
                changed = true;
                this[key] = fetch[key];
            }
        }

        if('modseq' in fetch && !('flags' in fetch)) {
            this.needsFetch = true;
        }

        return changed;
    }

    async close() {
        while(this.blobURLs.length > 0) {
            const blob_url = this.blobURLs.pop();
            URL.revokeObjectURL(blob_url);
        }

        this.clear();
    }

    // -------------------MIME-------------------

    // MIME Message
    // Decodes a raw message and turns it into a MIME message
    async handleMIMEMessage(ret=this) {
        if(typeof ret === "string" || Array.isArray(ret))
            ret = { message: ret }
        if((ret.headers === undefined || ret.body === undefined || ret.raw_headers === undefined)
            || !(typeof ret.headers === 'object' && Object.keys(ret.headers).length)
            || !(typeof Array.isArray(ret.raw_headers) && ret.raw_headers.length))
            [ ret.headers, ret.body, ret.raw_headers ] = await this.splitHeaders(ret.message);

        try {
            ret.inline = [];
            ret.attachments = [];

            // MIME-Version
            ret.mime_version = await this.loadMIMEvalue(ret.headers,'MIME-Version') || "";
            if(ret.mime_version.startsWith('1.')) // hey you never know
                ret.mime = true;
            else
                return false;

            const mime_objects = await this.handleMIMEBodyPart(ret);

            if(mime_objects.length > 1) {
                for(const object of mime_objects) {
                    if(object.content_disposition === "inline" || (object.content_disposition === null && object.content_type === 'text')) {
                        ret.inline.push(object)
                    } else {
                        ret.attachments.push(object);
                    }
                }
            } else if(mime_objects.length === 1) {
                for(const key of Object.keys(mime_objects[0])) {
                    ret[key] = mime_objects[0][key];
                }
                ret.inline = [ mime_objects[0] ];
            }
        } catch (e) {
            log('imap_message','Error loading message, probably MIME related',WARN,[e,ret]);
            this.mime = false;
        }

        return ret;
    }

    // MIME Body Part
    // Takes a body_part object and parses MIME headers in it
    async handleMIMEBodyPart(body_part) {
        if(typeof body_part === "string" || Array.isArray(body_part))
            body_part = { message: body_part }
        if(!('headers' in body_part))
            [ body_part.headers, body_part.body, body_part.raw_headers ] = await this.splitHeaders(body_part.message);

        // Content-Type read
        [ body_part.content_type, body_part.content_subtype ] = await this.loadMIMEContentType(await this.loadMIMEvalue(body_part.headers,'Content-Type'));

        // Content-Disposition
        body_part.content_disposition = await this.loadMIMEvalue(body_part.headers, 'content-disposition');

        if(body_part.content_disposition) {
            body_part.filename = await this.loadMIMEParameter(body_part,'content-disposition','filename');
            body_part.creation_date = await this.loadMIMEParameter(body_part,'content-disposition','creation_date');
            body_part.modification_date = await this.loadMIMEParameter(body_part,'content-disposition','modification_date');
            body_part.read_date = await this.loadMIMEParameter(body_part,'content-disposition','read_date');
        }

        // Content-Transfer-Encoding
        body_part.content_transfer_encoding = await this.loadMIMEvalue(body_part.headers,'Content-Transfer-Encoding');

        if(body_part.content_transfer_encoding)
            await this.MIMEContentTransferDecode(body_part);

        // Content-Type logic
        const mime_objects = await this.handleContentType(body_part);

        return mime_objects;
    }

    // Content-Transfer-Encoding
    async MIMEContentTransferDecode(ret) {
        switch(ret.content_transfer_encoding) {
            case "base64":
                ret.body = decodeBase64(ret.body);
                break;
            case "7bit":
            case "8bit":
                break;
            case "quoted-printable":
                ret.body = decodeQuotedPrintable(ret.body,false);
                break;
            case null:
                break;
            default:
                log("imap_message","Unsupported MIME Content-Transfer-Encoding, defaulting to application/octet-stream", DEBUG, ret);
                ret.content_type = "application";
                ret.content_subtype = "octet-stream";
                break;
        }

        return ret;
    }

    // Content-Type
    // Returns an array of parsed MIME objects
    async handleContentType(ret) {
        const objects = [];
        switch(ret.content_type) {
            case "multipart":
                log('imap_message','handleContentType: multipart',DEBUG);

                const multiparts = [];
                const lines = ret.body.split("\r\n");

                ret.multipart_boundary = await this.loadMIMEParameter(ret,'content-type','boundary');

                if(!ret.multipart_boundary) {
                    ret.attachments.push({
                        type: 'binary',
                        error: 'No MIME multipart/mixed boundary found',
                        content: ret.body
                    });
                    break;
                }

                const regexp = new RegExp('^--' + ret.multipart_boundary + '(?:--)?\s*$');

                var first_walker = lines.findIndex(l => regexp.test(l));
                var next_walker = lines.slice(first_walker+1).findIndex(l => regexp.test(l));
                var walker = 0;

                while(next_walker !== -1) {
                    walker = first_walker + next_walker + 1;

                    const sliced_body = lines.slice(first_walker+1,walker);

                    multiparts.push(sliced_body);

                    first_walker = walker;
                    const new_slice = lines.slice(first_walker+1);
                    next_walker = new_slice.findIndex(l => regexp.test(l));
                }

                for(const multipart of multiparts) {
                    switch(ret.content_subtype) {
                        // holy smokes
                        case "alternative":
                        case "related":
                        case "encrypted":
                        case "signed":
                        case "digest":
                        case "mixed":
                        default:
                            const parsed_mime = await this.handleMIMEBodyPart(multipart);

                            for(const object of parsed_mime) objects.push(object);
                            break;
                    }
                }
                break;

            case "text":
                log('imap_message','handleContentType: text',DEBUG);
                ret.charset = await this.loadMIMEParameter(ret,'content-type','charset') || "UTF-8"; // close enough
                if(ret.charset !== null && ret.body instanceof Uint8Array) {
                    const decoder = new TextDecoder(ret.charset);
                    ret.body = decoder.decode(ret.body);
                }
                switch(ret.content_subtype) {
                    case "html":
                        const domparser = new DOMParser();
                        ret.raw_html = ret.body;
                        ret.html = domparser.parseFromString(ret.body,'text/html');
                        ret.html.querySelectorAll('style').forEach((a) => a.remove());
                        ret.links = {};
                        const all_links = ret.html.querySelectorAll('a');
                        for(const i in all_links) {
                            const a = all_links[i];
                            if(a.href) {
                                a.innerText += "[" + i + "]";
                                ret.links[i] = a.href;
                            }
                        }

                        ret.body = ret.html.documentElement.innerText.replace(/^\s*$/gm,'');
                        objects.push(ret);
                        break;
                    case "plain":
                    default:
                        objects.push(ret);
                        break;
                }
                break;

            case "message":
                log('imap_message','handleContentType: message',DEBUG);
                ret.charset = await this.loadMIMEParameter(ret,'content-type','charset') || "UTF-8"; // close enough
                if(ret.charset !== null && ret.body instanceof Uint8Array) {
                    const decoder = new TextDecoder(ret.charset);
                    ret.body = decoder.decode(ret.body);
                }
                const message = new Message();
                await message.loadMessage(ret.body);
                await this.handleMIMEMessage(message);
                ret.message = message
                objects.push(ret);
                break;
            case "image":
            case "video":
            case "application":
            default:
                log('imap_message','handleContentType: default',DEBUG);
                objects.push(ret);
                break;
        }

        return objects;
    }

    async loadMIMEContentType(string) {
        if(!string)
            return [ "text", "plain" ];
        const match = string.match(/([\w\-]*)\/([\w\-\+]*) ?.*/);

        if(match)
            return [ match[1], match[2] ];
        else
            return [ string, null ];
    }

    async loadMIMEvalue(headers=this.headers,header_name) {
        if(!headers)
            return null;
        const header_value = headers.get(header_name,'one');
        if(header_value) {
            const match = header_value.match(/^(".*?"|[^;\s]*)/);
            if(match)
                return match[1].toLowerCase().replace(/^"/,'').replace(/"$/,'');
        }
        return null;
    }

    async loadMIMEParameter(ret=this,header,parameter,allowCharset=false) {
        if(!header) {
            return null;
        }
        if(!(header.toLowerCase() in ret.headers.headerKeys)) {
            return null;
        }

        header = ret.headers.get(header,'one');
        var vbytes = [];

        const r_full = new RegExp(';\\s*' + parameter + '(?:\\*([\\d]+))?(\\*?)=(".*?"|[^;\\s]+)');
        const r_encoded_value = new RegExp(/(?:([\w\-]*)\')?(?:([\w\-]*)\')?(.*)/);
        const rg = new RegExp(r_full,'g');

        var encoding = null;
        var lang = null; // who uses this shit
        var decoder = new TextDecoder('utf-8');
        var encoder = new TextEncoder('utf-8');

        const match_all = header.match(rg);

        if(match_all) {
            const values = {};
            for(const match_full of match_all) {
                const [ _, seq, uses_encoding, this_value ]  = match_full.match(r_full);
                values[parseInt(seq)] = {
                    uses_encoding: uses_encoding === "*",
                    value: this_value.replace(/^"/,'').replace(/"$/,'')
                };
                if(!seq) break;
            }
            for(const key of Object.keys(values)) { // it's crazy this sorts numbers
                const this_value = values[key];

                if(this_value.uses_encoding && this_value.value) {
                    const bytes = [];

                    if(!encoding) {
                        const encoded_match = this_value.value.match(r_encoded_value);
                        var _, this_encoding, this_lang, this_encoded_value;

                        if(encoded_match) {
                            [_, this_encoding, this_lang, this_encoded_value ] = encoded_match;
                            encoding = this_encoding ? this_encoding : 'UTF-8';
                            lang = this_lang ? this_lang : 'EN';
                            this_value.value = this_encoded_value;
                        } else {
                            encoding = 'UTF-8';
                            lang = 'EN';
                        }

                        decoder = new TextDecoder(encoding);
                    }

                    var i=0;
                    while(i < this_value.value.length) {
                        if(
                            this_value.value[i] === "%" &&
                            i + 2 < this_value.value.length &&
                            this_value.value[i+1].match(/[0-9A-F]/) &&
                            this_value.value[i+2].match(/[0-9A-F]/)
                        ) {
                            const hex = this_value.value.slice(i+1, i+3);
                            bytes.push(parseInt(hex, 16));
                            i += 2;
                        } else {
                            bytes.push(this_value.value.charCodeAt(i));
                        }
                        i++;
                    }

                    vbytes = [ ...vbytes, ...bytes ];
                } else {
                    vbytes = [ ...vbytes, ...encoder.encode(values[key].value) ];
                }

            }

            return decoder.decode(new Uint8Array(vbytes));
        } else {
            return null;
        }
    }

    // ------------------Parsers-----------------

    // Expects an array of lines
    // Returns [ MessageHeaders headers, string body ]
    async splitHeaders(content) {
        const splicepoint = content.indexOf("");
        if(splicepoint === -1)
            return [ {}, content.join("\r\n"), {} ];
        return [
            new MessageHeaders(content.slice(0,splicepoint+1)),
            content.slice(splicepoint+1).join("\r\n"),
            content.slice(0,splicepoint+1)
        ];
    }

    // -----------------Compilers----------------

    async extractRCPTs(rcptarray) {
        if(!rcptarray)
            rcptarray = ['to','cc','bcc'].map(a => this.headers.get(a,'join'));
        const rcpts = new Set(
            (await extractAddresses(rcptarray)).map(a => a[1])
            );

        // keeping this because it's cool
        //rcptarray.filter(Boolean)
        //    .forEach((a) => a
        //        // capital letters are scary
        //        .toLowerCase()
        //        // Remove quoted strings
        //        .replace(/"(?:[^\\"]|\\.)*"/g,'')
        //        // Remove comments
        //        .replace(/\((?:[^\\\(\)]|\\.)*\)/g,'')
        //        // Remove spaces
        //        .replace(/\s/g,'')
        //        // Remove list names
        //        .replace(/[^:;,]*:(.*?);/,'$1,')
        //        // Remove escaped commas
        //        .replace(/\\,/g,'')
        //        // Split into mailbox addresses
        //        .split(',')
        //        // Unbracket e-mail addresses
        //        .map((b) => b.replace(/.*<(.*?)>.*/,'$1'))
        //        // Remove invalid addresses (fight me)
        //        .filter((b) => b.match('@'))
        //        // Add the addresses
        //        .forEach((b) => rcpts.add(b))
        //    );

        return [ ...rcpts ];
    }

    async compileHeaders(headers=this.headers) {
        const out = [];
        for(const key of Object.keys(headers.headers)) {
            for(const value of headers.headers[key]) {
                out.push(key + ': ' + this.compileHeaderValue(value));
            }
        }

        return out
            .map(h => foldHeader(h))
            .join('\r\n');
    }

    compileHeaderValue(string) {
        const contains_uchar = string.matchAll(/\w*[^\u0000-\u00ff]+\w*/g)
        if(contains_uchar) {
            for(const match of contains_uchar) {
                string = string.replace(match,encodeMIMEWords(match[0]))
            }
        }

        return string;
    }

    compileFilename(string) {
        var hex = hex_encode(string,'%');
        var r = [];
        var i=0;
        while(true) {
            const l = (i === 0) ? 54 : 63;
            const match = hex.match(new RegExp('(.{1,'+l.toString()+'})'));
            if(match) {
                var s = ''
                s += "filename*"+i.toString()+"*=";
                if(i === 0)
                    s += "UTF-8''"
                s += match[0].toUpperCase() + ';';
                r.push(s);
                hex = hex.slice(match[0].length);
                i++;
            } else {
                break;
            }
        }
        return r.join(' ');
    }

    // calculate `message`: do the opposite of loadMessage
    async compile(smtp=true) {
        this.inline = [ {body: this.body} ];

        var message = '';

        for(const inline of this.inline) {
            if(!inline.headers) inline.headers = new MessageHeaders();
            inline.headers.set('Content-Type','text/plain; charset=UTF-8;');
            inline.headers.set('Content-Transfer-Encoding','8bit');

            if(inline.body.split("\r\n").filter((a) => a.length > 998).length) {
                inline.headers.set('Content-Transfer-Encoding','base64');
                inline.body = wrap(encodeBase64(inline.body));
            }
        }

        for(const attachment of this.attachments) {
            if(!attachment.headers) attachment.headers = new MessageHeaders();
            attachment.headers.set('Content-Transfer-Encoding','base64');
            attachment.headers.set('Content-Disposition','attachment;');
            if(attachment.filename) {
                attachment.headers.append('Content-Disposition', ' ' + this.compileFilename(attachment.filename));
            }
            if(attachment.content_type) {
                attachment.headers.set('Content-Type',attachment.content_type + '/' + attachment.content_subtype);
            } else {
                attachment.headers.set('Content-Type','application/octet-stream');
            }
        }

        if(this.content_type === "multipart" && this.content_subtype === "mixed") {
            while(true) {
                this.multipart_boundary = '------------' + randomHex(12);
                for(const inline of this.inline) {
                    if(inline.body.match(new RegExp('^.?.?'+this.multipart_boundary)))
                        continue;
                }
                break;
            }

            this.headers.set('Content-Type','multipart/mixed; boundary="'+this.multipart_boundary+'"');

            message = await this.compileHeaders(this.headers);
            message += '\r\n\r\n';
            message += "This is a multi-part message in MIME format.\r\n";

            for(const inline of this.inline) {
                message += '\r\n--' + this.multipart_boundary + '\r\n';
                message += await this.compileHeaders(inline.headers);
                message += '\r\n\r\n';
                message += inline.body.replace(/([^\r])\n/gm,'$1\r\n');
                message += '\r\n';
            }

            const decoder = new TextDecoder('utf-8');

            for(const attachment of this.attachments) {
                message += '\r\n--' + this.multipart_boundary + '\r\n';
                message += await this.compileHeaders(attachment.headers);
                message += '\r\n\r\n';
                const bytes = await attachment.blob.bytes();
                var bytestring = '';
                for(var i=0; i<bytes.length; i+=32768) {
                    bytestring += String.fromCharCode.apply(null,bytes.subarray(i,i+32768));
                }
                message += wrap(btoa(bytestring));
                message += '\r\n';
            }

            message += '\r\n--' + this.multipart_boundary + '--';
        } else {
            for(const header of Object.keys(this.inline[0].headers.headers)) {
                this.headers.set(header,this.inline[0].headers.get(header,'one'));
            }
            message = await this.compileHeaders(this.headers)
                + '\r\n\r\n'
                + this.inline[0].body;
        }

        if(smtp)
            message = message.replace(/^\.$/gm,'..');


        this.message = message;

        this.blob = new Blob([this.message], {type: 'message/rfc822'});

        return this.message;
    }

    // Return a compact message object for storage
    async slim(full) {
        const message = {};

        const fields = full
            ? ['uid','message']
            : ['uid','modseq','flags','headers'];
        
        for(const key of fields) {
            if(key === 'headers') message.headers = this.headers.headers;
            else message[key] = this[key];
        }

        return message;
    }

    // -----------------Responses----------------

    async reply(method='one') {
        // method: one all list
        const reply_to = this.headers.get('reply-to','one') || this.headers.get('from','one');

        var subject = decodeMIMEWords(this.headers.get('subject','one'), false) || "(no subject)";
        if(!subject.match(/^re:/i))
            subject = "Re: " + subject;

        const reply = new Message({
            isreply: true,
            headers: {
                to: decodeMIMEWords(reply_to,false),
                subject: subject
            },
            body: `On ${this.headers.get('date','one')}, ${decodeMIMEWords(this.headers.get('from','one'), false)} wrote:\r\n`
        });

        if(this.inline.length) reply.body += this.inline[0].body.split("\n").map((a) => '> ' + a).join("\n");
        else reply.body += this.body.split("\n").map((a) => '> ' + a).join("\n")

        if(method === "list") {
            const listaddr = await this.isList();
            if(listaddr) reply.headers.set('to',decodeMIMEWords(listaddr,false));
            else method = "all";
        }

        if(method === "all") {
            reply.headers.set('to', [ reply_to, this.headers.get('to','join') ]
                .filter(Boolean)
                .map((a) => decodeMIMEWords(a,false))
                );
            reply.headers.set('to', reply.headers.get('to')
                .filter((a,p) => {
                    return reply.headers.get('to').findIndex(b => {
                        return b.match(new RegExp('(?:^'+escapeRegex(a)+'$|<'+escapeRegex(a)+'>)'))
                    }) === p
                })
                .join(',')
                );
            reply.headers.set('cc',decodeMIMEWords(this.headers.cc,false));
        }

        if(this.headers.get('message-id')) {
            reply.headers.set('In-Reply-To', this.headers.get('message-id','one'));
            reply.headers.set('References', this.headers.get('references')
                ? this.headers.get('references') + ' ' + this.headers.get('message-id')
                : this.headers.get('message-id')
                );
        }

        return reply;
    }

    async forward() {
        const reply = new Message({
            headers: {
                subject: 'Fwd: ' + (decodeMIMEWords(this.headers.get('subject','one'),false) || "(no subject)"),
            },
            body: ""
        });

        reply.body += `----- Forwarded message from ${decodeMIMEWords(this.headers.get('from','one'),false) || "(blank)"} -----\r\n`;
        reply.body += `Date: ${decodeMIMEWords(this.headers.get('date','one'),false) || "(blank)"}\r\n`;
        reply.body += `From: ${decodeMIMEWords(this.headers.get('from','one'),false) || "(blank)"}\r\n`;
        reply.body += `To: ${decodeMIMEWords(this.headers.get('to','join'),false) || "(blank)"}\r\n`;
        if(this.headers.get('cc'))
            reply.body += `CC: ${decodeMIMEWords(this.headers.get('cc','join'),false)}\r\n`
        reply.body += `Subject: ${decodeMIMEWords(this.headers.get('subject','one'),false) || "(no subject)"}\r\n`;
        reply.body += "\r\n";
        if(this.inline.length) reply.body += this.inline[0].body;
        else reply.body += this.body;
        reply.body += "\r\n";
        reply.body += `----- End forwarded message -----\r\n`;

        return reply;
    }

    // ------------------Helpers-----------------

    async addFlags(flags) {
        if(typeof flags === 'string') flags = [flags];

        var changed = false;
        for(const flag of flags) {
            if(!this.flags.includes(flag)) {
                this.flags.push(flag);
                changed = true;
            }
        }

        return changed;
    }

    async removeFlags(flags) {
        if(typeof flags === 'string') flags = [flags];

        var changed = false;
        for(const flag of flags) {
            const flagIndex = this.flags.indexOf(flag);
            if(flagIndex !== -1) {
                this.flags.splice(flagIndex,1);
                changed = true;
            }
        }

        return changed;
    }

    async isList() {
        if(this.headers.get('list-post')) {
            const post_match = this.headers.get('list-post','join').match(/<mailto:(.*?)>/);
            return post_match[1] || false;
        } else return false;
    }
}

//---------------------------------MessageHeaders-----------------------------

class MessageHeaders {
    constructor(headers) {
        this.clear();

        if(typeof headers === 'string') headers = headers.split('\r\n');

        if(Array.isArray(headers)) {
            this.load(headers);
        } else if(typeof headers === 'object') {
            for(const name of Object.keys(headers)) {
                this.set(name,headers[name]);
            }
        }
    }

    clear() {
        this.headers = {};
        this.headerKeys = {};
    }

    // how many UNIQUE header names have been added
    get length() {
        return Object.keys(this.headerKeys).length;
    }

    // Expects an array of lines
    load(headers_in) {
        var lastHeader;
        for(const i in headers_in) {
            const header = headers_in[i];
            if(header == "") continue;

            const continuation = header.match(/^[\s\)]+/)
            if(continuation) {
                this.append(lastHeader,header.replace(/^\s+/,' '));
                continue;
            }

            const colon_match = header.match(/(.+?):\s?(.*)/);
            if(colon_match) {
                const header_name = colon_match[1].toLowerCase();
                const header_value = colon_match[2]
                this.add(header_name,header_value);
                lastHeader = header_name;
                continue;
            }
        }
    }

    get(name,method='all',join=',') {
        const ikey = name.toLowerCase();
        const keys = this.headerKeys[ikey];

        if(!keys) return false;

        const values = [];

        for(const key of keys) {
            if(method === 'one') return this.headers[key]?.[0];
            values.push(...this.headers[key]);
        }

        if(method === 'join') return values.join(join);
        else return values;
    }

    add(name,value) {
        const ikey = name.toLowerCase();

        if(this.headerKeys[ikey]) {
            if(!this.headerKeys[ikey].includes(name)) {
                this.headerKeys[ikey].push(name);
            }
        } else {
            this.headerKeys[ikey] = [name];
        }

        const existing = this.headers[name];

        if(existing)
            this.headers[name].push(value);
        else
            this.headers[name] = [value];
    }

    set(name,value) {
        this.delete(name);

        const ikey = name.toLowerCase();

        this.headerKeys[ikey] = [name];
        this.headers[name] = Array.isArray(value) ? value : [value];
    }

    append(name,value) {
        if(name in this.headers && this.headers[name].length) {
            this.headers[name][this.headers[name].length-1] += value;
            return;
        }

        const ikey = name.toLowerCase();
        if(ikey in this.headerKeys) {
            const key = this.headerKeys[ikey].slice(-1);
            this.headers[key][this.headers[key].length-1] += value;
            return;
        }

        return this.add(name,value);
    }

    delete(name) {
        const ikey = name.toLowerCase();
        for(const key of (this.headerKeys[ikey]||[])) delete this.headers[key];
        delete this.headerKeys[ikey];
    }
}

//-------------------------------------SMTP-----------------------------------

class SmtpClient {
    constructor(smtpURL=window.config.smtp_server) {
        this.smtpURL = smtpURL;

        // WebSocket
        this.ws = null; // Set in connect()

        // Buffers, Queues
        this.responseBuffer = new Uint8Array();
        this.commandQueue = Promise.resolve();
        this.responseQueue = Promise.resolve();

        // Server info
        this.capabilities = new Set();

        this.ehlo = window.config.ehlo;
        this.maxrcpt = window.config.maxrcpt;

        // State flags
        this.connected = false;        // Socket open
        this.reconnect = true;         // Reconnect on socket close
        this.receivedGreeting = false; // Server is alive
        this.loggedin = false;         // Currently logged in

        // State info
        this.username = null;      // Set if ever logged in
        this.commandState = null;  // State info for commands that don't fit in a single message

        // Public (settable) Callbacks
        this.onopen = null;    // On socket open and received greeting
        this.onclose = null;   // On socket close
        this.onmessage = null; // On any partial or full message from IMAP
        this.onerror = null;   // On socket open

        // Internal Callbacks, Timeouts
        this._onopen = null;    // On socket open and received greeting
        this._onclose = null;   // On socket close
        this._onmessage = null; // On partial or full message
        this._onerror = null;   // On socket error

        // Engines
        this.encoder = new TextEncoder();
        this.decoder = new TextDecoder('utf-8');
    }

    // Wait for connection to complete and receive greeting
    async connect() {
        // WebSocket
        this.ws = new WebSocket(this.smtpURL);
        this.ws.binaryType = "arraybuffer";
        this.ws.onopen = this.#onWsOpen;
        this.ws.onclose = this.#onWsClose;
        this.ws.onerror = this.#onWsError;
        this.ws.onmessage = this.#onWsMessage;

        return new Promise((resolve, reject) => {
            this._onmessage = this.#handleCommandResponse.bind(this, ({response_code, response_message, response_data}) => {
                if(response_code === 220) {
                    resolve({response_code, response_message, response_data});
                } else {
                    reject({response_code, response_message, response_data});
                }
            });
        });
    }

    // Send an e-mail over SMTP
    async send(username, password, from, message) {
        // Extract RCPTs
        const rcpts = await message.extractRCPTs();

        if(!rcpts.length) {
            throw "No recipients!";
        }

        if(rcpts.length > this.rcptmax) {
            throw `Too many recipients: ${rcpts.length} / ${this.rcptmax}`;
        }

        const bcc = message.headers.get('bcc');
        delete message.headers.delete('bcc');

        // Add Date, Message-ID, and User-Agent headers
        message.headers.set('Date',new Date().toUTCString().replace(/\w*$/,'+0000'));
        message.headers.set('Message-ID','<' + uuid4() + '@' + (from.split('@')[1] || '127.0.0.1') + '>');
        if(window.AccountSettings.userAgent)
            message.headers.set('User-Agent',window.AccountSettings.userAgent);

        // Connect websocket
        const { response_code } = await this.connect();

        // EHLO
        if(true) { // NEVER trust an open bracket on its own line. Every { needs a supervisor.
            const { response_code, response_message, response_data } = await this.#command(`EHLO ${this.ehlo}`);

            const capabilities_raw = [ ...response_data.slice(1), response_message ];
            const capabilities = [];
            for(const capability of capabilities_raw) {
                if(capability.startsWith('AUTH')) {
                    const auth_split = capability.split(' ');
                    for(const auth of auth_split.slice(1)) {
                        capabilities.push('AUTH ' + auth);
                    }
                } else {
                    capabilities.push(capability);
                }
            }
            this.capabilities = new Set(capabilities);

            log('smtp', "Set capabilities", DEBUG, this.capabilities);
        }

        // AUTH
        await this.login(username,password);

        // MAIL FROM
        if(true) {
            const arg = `FROM: ${from}`;
            const { response_code, response_message, response_data } = await this.#command(`MAIL ${arg}`);
            if(response_code !== 250) throw {cmd: "MAIL", arg: arg, msg: response_code + ' ' + response_message};

        }

        // RCPT TO
        for(const rcpt of rcpts) {
            const arg = `TO: ${rcpt}`;
            const { response_code, response_message, response_data } = await this.#command(`RCPT ${arg}`);
            if(response_code !== 250) throw {cmd: "RCPT", arg: arg, msg: response_code + ' ' + response_message};
        }

        // DATA
        if(true) {
            const { response_code, response_message, response_data } = await this.#command("DATA");
            if(response_code !== 354) throw {cmd: "DATA", msg: response_code + ' ' + response_message};
        }

        this.#send(await message.compile(true));

        //  .
        if(true) {
            const { response_code, response_message, response_data } = await this.#command("\r\n.");
            if(response_code !== 250) throw {cmd: "ENDDATA", msg: response_code + ' ' + response_message};
        }

        // QUIT

        await this.quit();

        if(bcc) message.headers.set('BCC',bcc);

        message.flags.push("\\Seen");

        await message.compile(false);

        await message.onsend?.();

        return message;
    }

    // Send raw string to socket, plus CRLF
    #send(cmd,containsPass) {
        if (this.ws.readyState !== WebSocket.OPEN) throw new Error("Not connected");

        const logmsg = containsPass
            ? 'AUTH PLAIN AEF6dXJlRGlhbW9uZABodW50ZXIy'
            : cmd;

        log('smtp_out', logmsg, DEBUG);

        const arrayBuffer = this.encoder.encode(cmd + "\r\n").buffer;
        this.ws.send(arrayBuffer);
    }

    // Run an SMTP command and set finish callback
    async #command(cmd, handler=this.#handleCommandResponse, containsPass=false) {
        await this.commandQueue;

        this.commandQueue = this.commandQueue.then(() => {
            handler = handler.bind(this);

            const finishPromise = new Promise((resolve, reject) => {
                handler = handler.bind(this, ({response_code, response_message, response_data}) => {
                    resolve({ response_code, response_message, response_data });
                });
            });

            this._onmessage = handler;
            this.#send(cmd,containsPass);

            return finishPromise;

        });

        return this.commandQueue;

    }

    // LOGIN: Log in with a given username and password
    async login(user, pass) {
        if(!this.capabilities.has("AUTH PLAIN")) {
            throw "Server has no AUTH PLAIN capability!";
        }

        const auth_value = btoa("\0" + user + "\0" + pass)

        const { response_code, response_message, response_data } = await this.#command(`AUTH PLAIN ${auth_value}`, undefined, undefined, true);

        this.loggedin = response_code === 235;

        if(this.loggedin) {
            this.username = user;
            this.onlogin?.();
        } else {
            throw {cmd: "AUTH", msg: `${response_code} ${response_message}`};
        }

        return { response_code, response_message, response_data };
    }

    // QUIT: End of the connection
    async quit() {
        const { response_code, response_message, response_data } = await this.#command("QUIT");

        await this.close();

        if(response_code !== 221) {
            throw {cmd: "QUIT", msg: response_code + ' ' + response_message};
        }
    }

    #onWsOpen = async () => {
        this.connected = true;
        //this.onopen?.();
    }

    #onWsClose = async () => {
        this.connected = false;
        this.#clear();
        this._onclose?.();
        this.onclose?.();
    }

    #onWsError = e => {
        this._onerror?.(e);
        this.onerror?.(e);
    }

    #onWsMessage = async ({ data }) => {
        data = new Uint8Array(data);

        const decoded = this.decoder.decode(data);
        log('smtp_in', decoded.toString(), DEBUG);

        this.responseQueue = this.responseQueue.then(async () => {
            const newBuffer = new Uint8Array(this.responseBuffer.byteLength + data.byteLength);
            newBuffer.set(this.responseBuffer,0);
            newBuffer.set(data,this.responseBuffer.byteLength);

            this.responseBuffer = newBuffer;

            await this._onmessage?.();
            await this.onmessage?.();
        });

        await this.responseQueue;
    }

    async #handleCommandResponse(responseCallback) {
        const decoded = this.decoder.decode(this.responseBuffer);

        // Only deal with complete lines
        if(decoded.slice(-2) !== "\r\n") return;

        // Only deal with completed commands
        const command_regexp = /^(\d{3}) (.*)/m
        const command_match = decoded.match(command_regexp);
        if(!command_match) return;

        this.responseBuffer = this.responseBuffer.slice(command_match.index + command_match[0].length);

        const [ response_code, response_message ] = [ parseInt(command_match[1]), command_match[2] ];

        const data_regexp = new RegExp('^' + response_code + '-(.*)\r\n','gm');
        const response_data = [ ...decoded.matchAll(data_regexp)].map((a) => a[1]);

        await responseCallback({ response_code, response_message, response_data });
    }

    #clear() {
        this.commandState = null;
        this.commandQueue = Promise.resolve();
        this.responseQueue = Promise.resolve();
        this.clearBuffer();
    }

    clearBuffer() {
        this.responseBuffer = new Uint8Array();
    }

    close() {
        this.ws.close();
    }
}

class CockmailStorage {
    constructor(dbname="global") {
        this.dbnameprefix = "cock-mail-"
        this.dbname = dbname;
        this.version = 2;
        this.db = null;

        this.dbopen = null;
    }

    async init() {
        this.dbopen = indexedDB.open(this.dbnameprefix + this.dbname, this.version);

        this.dbopen.onupgradeneeded = this.upgrade.bind(this);

        const wait_connect = new Promise((resolve, reject) => {
            this.dbopen.onsuccess = resolve;
            this.dbopen.onerror = reject;
        });

        await wait_connect;

        this.db = this.dbopen.result;

        this.db.onversionchange = this.versionchange;
    }

    async versionchange(e) {
        await this.db?.close();
        alert("Database is broken! Either you deleted your browser storage or opened a more recent version of cock-mail in a new tab. Either way I'm gonna GTFO now.");
        document.body.innerHTML="<h1>I broke!</h1>";
    }

    async get(store,key) {
        const tx = this.db.transaction(store);
        const s = tx.objectStore(store);

        const request = key
            ? s.get(key)
            : s.getAllKeys();

        const wait_get = new Promise((resolve, reject) => {
            request.onsuccess = resolve;
            request.onerror = reject;
        });

        const response = await wait_get;

        return response.target.result;

    }

    async getAll(store) {
        const tx = this.db.transaction(store);
        const s = tx.objectStore(store)

        const request = s.getAll();

        const wait_get = new Promise((resolve, reject) => {
            request.onsuccess = resolve
            request.onerror = reject;
        });

        const response = await wait_get;

        return response.target.result;
    }

    async put(store,key,value) {
        const tx = this.db.transaction(store,'readwrite');
        const s = tx.objectStore(store);

        const request = await s.put(value,key);

        const wait_put = new Promise((resolve, reject) => {
            request.onsuccess = resolve;
            request.onerror = reject;
        });

        const response = await wait_put;

        return tx;
    }

    async delete(store,key) {
        const tx = this.db.transaction(store,'readwrite');
        const s = tx.objectStore(store);

        const request = key
            ? s.delete(key)
            : s.clear();

        const wait_delete = new Promise((resolve, reject) => {
            request.onsuccess = resolve;
            request.onerror = reject;
        });

        const response = await wait_delete;

        return response.target.result;
    }

    async deleteDB(keepalive=false) {
        if(keepalive) this.db.onversionchange = null;

        await this.close();

        const dbdelete = indexedDB.deleteDatabase(this.dbnameprefix + this.dbname);

        const wait_delete = new Promise((resolve, reject) => {
            dbdelete.onsuccess = resolve;
            dbdelete.onerror = reject;
        });

        return wait_delete;
    }

    async close() {
        return await this.db.close();
    }
}

class GlobalStorage extends CockmailStorage {
    async upgrade(e) {
        const tx = e.target.transaction;
        this.db = this.dbopen.result;
        switch(e.oldVersion) {
            case 0:
                const settings = this.db.createObjectStore('settings');
                const accounts = this.db.createObjectStore('accounts');
                const lsKeys = Object.keys(localStorage);
                if(lsKeys.includes('cock-mail-settings')) {
                    const lsSettings = JSON.parse(localStorage.getItem('cock-mail-settings'));
                    for(const key of Object.keys(lsSettings)) {
                        settings.put(lsSettings[key], key);
                    }
                    localStorage.removeItem('cock-mail-settings');
                }
                if(lsKeys.includes('cock-mail-accounts')) {
                    const lsSettings = JSON.parse(localStorage.getItem('cock-mail-accounts'));
                    for(const username of Object.keys(lsSettings))
                        accounts.put(lsSettings[username],username);
                    localStorage.removeItem('cock-mail-accounts');
                }
                break;
        }
    }
}

class AccountStorage extends CockmailStorage {
    async upgrade(e) {
        const db = this.dbopen.result;
        switch(e.oldVersion) {
            case 0:
                const mailboxes = db.createObjectStore('mailboxes');
                mailboxes.createIndex('use_flags_idx', 'use_flags', {unique: false, multiEntry: true});
                mailboxes.createIndex('order_idx', 'order', {unique: false});
                const settings = db.createObjectStore('settings');
                break;
        }
    }
}

class MailboxStorage extends CockmailStorage {
    async upgrade(e) {
        const db = this.dbopen.result;
        switch(e.oldVersion) {
            case 0:
                db.createObjectStore('state');
                db.createObjectStore('messages');
                db.createObjectStore('fullMessages');
                break;
            case 1:
                db.createObjectStore('fullMessages');
                break;
        }
    }
}

async function migrateStorage() {
    const lsKeys = Object.keys(localStorage);
    for(const key of lsKeys) {
        if(key === "cock-mail-settings" || key === "cock-mail-accounts") continue;
        const decoded = hex_decode(key);
        log('storage',"Migrating: " + decoded, INFO);
        const data = JSON.parse(localStorage.getItem(key));

        const mailbox = new MailboxStorage(decoded);
        await mailbox.init();

        const keys = Object.keys(data);
        var message_count = 0;

        for(const key of keys) {
            if(key === "messages") {
                const messages = Object.keys(data[key]);
                message_count = messages.length;
                for(const uid of messages) {
                    await mailbox.put('messages',uid,data[key][uid]);
                }
            } else {
                await mailbox.put('state',key,data[key]);
            }
        }

        log('storage',`Migrated ${keys.length} states and ${message_count} messages`,INFO);

        localStorage.removeItem(key);

        mailbox.close();

    }
}

function splitExceptQuotes(string,delimiter,escapeOpen=true) {
    var result = [];
    var pq = false;
    var cv = '';
    const quote = (string,pos) => (string[pos] === '"' && (!escapeOpen || (string[pos-1] !== '\\' || (string[pos-1] === '\\' && string[pos-2] === '\\'))))
    for(var pos=0;pos<string.length;pos++) {
        if(pq) {
            if(quote(string,pos)) {
                pq = false;
            }
            cv += string[pos];
            continue;
        }
        if(quote(string,pos)) {
            pq = true;
        } else if(string[pos] === delimiter) {
            result.push(cv);
            cv = '';
            continue
        };

        cv += string[pos];
    }

    result.push(cv);

    return result;
}

function escapeQuotes(string) {
    return string.replace(/\\/g,'\\\\').replace(/"/g,'\\"');
}

function unescapeQuotes(string) {
    return string.replace(/([^\\]|^)\\"/g,'$1"').replace(/\\\\/g,'\\');
}

// Extracts address fields into name/address parts.
// No it's not perfect. Yes it's good enough. Probably.
async function extractAddresses(addresses) {
    if(typeof addresses === 'string') {
        addresses = [addresses]
    }

    const parsed = [];

    for(const ai of addresses.filter(Boolean)) {
        var pa = false; // Is parsing address
        var pm = false; // Has seen list name
        var pq = false // Is parsing quote
        var pci = 0; // Current comment level
        var cn = ''; // Current name
        var ca = ''; // Current address

        for(var pos=0;pos<ai.length;pos++) {
            if(ai[pos] === '\r' || ai[pos] === '\n')
                continue; // anything else and you're on your own
            if(pa) {
                if(ai[pos] === ';') {
                    continue;
                }
                if(ai[pos] === ',') {
                    pa=false;
                    parsed.push([cn,ca]);
                    cn = '';
                    ca = '';
                    continue;
                }
                if(ai[pos] === '>') {
                    // End parsing address
                    pa=false;
                    parsed.push([cn,ca]);
                    cn = '';
                    ca = '';
                    continue;
                }
                ca += ai[pos];
                continue;
            }
            // no pa
            if(pq) {
                if(ai[pos] === '"' && ai[pos-1] !== '\\') {
                    pq = false;
                    continue;
                }
            } else { // no pq
                if(ai[pos] === '(' && ai[pos-1] !== '\\(') {
                    // Increment pci
                    pci++;
                    continue;
                }
                if(pci) {
                    if(ai[pos] === ')' && ai[pos-1] !== '\\)') {
                        // Subtract pci
                        pci--;
                    }
                    continue;
                }
                if(ai[pos] === '"') {
                    pq = true;
                    continue;
                }
                if(ai[pos] === ':') {
                    // Mailing list name, ignore
                    cn = '';
                    continue;
                }
                if(ai[pos] === '<') {
                    pa = true;
                    continue;
                }
                if(ai[pos] === ';' || ai[pos] === ',' || ai[pos] === '@' || ai.length-1 === pos) {
                    // Looks like it was an e-mail address this whole time lol
                    ca = cn;
                    cn = '';
                    pa = true;
                    pos--;
                    continue;
                }
            }

            cn += ai[pos];
        }
        if(ca)
            parsed.push([cn,ca]);
    }

    return parsed
        // Only non-empty addresses
        .filter(a => a[1])
        // Unescape quotes
        .map(a => [a[0].replace(/\\"/g,'"'),a[1]])
        // Remove extra spaces
        .map(a => [
            a[0]
                .replace(/\s\s+/g,' ')
                .replace(/^\s+/,'')
                .replace(/\s+$/,'')
            ,a[1]
                .replace(/\s/g,'')
        ])
        // Convert empty strings to null
        .map(a => a.map(a => a || null));
}

function foldHeader(string) {
    string = string.replace(/\s*$/,'');

    var out = "";

    while(true) {
        if(string.length <= 78) {
            // Short string
            out += string;
            break;
        }

        // Last foldable <= 78 OR first foldable
        const match = string.slice(0,78).match(/.+\s/)
            || string.match(/^.+?\s/);
        if(match) {
            // Fold
            breakpoint = match.index + match[0].length - 1;
            out += string.slice(0,breakpoint).replace(/\s+$/,'') + "\r\n";
            string = string.slice(breakpoint);
        } else {
            // Long string
            out += string.replace(/\s+$/,'');
            break;
        }
    }

    return out;
}

function randomHex(len) {
    return [ ...crypto.getRandomValues(new Uint8Array(len)) ].map(a => a.toString(16).padStart(2,'0')).join('');
}

// "Secure contexts everywhere" actually fuck off right here this is bullshit
function uuid4() {
    // xxxxxxxx-xxxx-4xxx-[8-b]xxx-xxxxxxxxxxxx
    var random = randomHex(16).split('');
    random[12] = '4';
    random[16] = (crypto.getRandomValues(new Uint8Array(1))[0] % 4 + 8).toString(16);

    return random.join('').replace(/(.{8})(.{4})(.{4})(.{4})(.{12})/,'$1-$2-$3-$4-$5');
}

// [1,2,3] -> "1:3"
function compactUIDEncode(uids) {
    if(typeof uids === "string") {
        return compactUIDEncode(compactUIDDecode(uids));
    }
    if(!Array.isArray(uids) || uids.length === 0) {
        return "";
    }

    // Make sure we work with sorted unique numbers
    const sorted = [...new Set(uids)].sort((a, b) => a - b);

    const ranges = [];
    let start = parseInt(sorted[0]);
    let prev = parseInt(sorted[0]);

    for (let i = 1; i < sorted.length; i++) {
        const current = parseInt(sorted[i]);

        // If current is exactly next number → continue the range
        if (current === prev + 1) {
            prev = current;
            continue;
        }

        // Range ended
        if (start === prev) {
            ranges.push(String(start));
        } else {
            ranges.push(`${start}:${prev}`);
        }

        // Start new range
        start = current;
        prev = current;
    }

    // Don't forget the last range/single value
    if (start === prev) {
        ranges.push(String(start));
    } else {
        ranges.push(`${start}:${prev}`);
    }

    return ranges.join(",");
}

function stringToBytes(string,charset=null) {
    const bytes = [];
    for(i=0;i<string.length;i++) {
        bytes.append(string.charCodeAt(i));
    }
}

// "1:3" -> [1,2,3]
function compactUIDDecode(compactUids) {
    const uids = new Array();

    for(const uidIter of compactUids.split(',')) {
        if(uidIter.includes(":")) {
            const uidIterSplit = uidIter.split(':');
            for(var i=Math.max(uidIterSplit[0],1);i<=uidIterSplit[1];i++) {
                uids.push(parseInt(i));
            }
        } else {
            uids.push(parseInt(uidIter));
        }
    }

    return uids;
}

function hex_encode(str,bytedelimiter=null) {
    const encoder = new TextEncoder('utf-8');
    const bytes = encoder.encode(str);
    var hex = '';
    for(var i=0;i<bytes.length;i++) {
        if(bytedelimiter)
            hex += bytedelimiter;
        hex += bytes[i].toString(16).padStart(2,"0");
    }
    return hex;
}

function hex_decode(str) {
    return str.split(/(\w\w)/g)
        .filter(p => !!p)
        .map(c => String.fromCharCode(parseInt(c, 16)))
        .join("");
}

function decodeQuotedPrintable(string,isEncodedWord=true) {
    const bytes = [];
    var i=0;

    if(isEncodedWord)
        string = string.replace(/_/g, "=20");

    while(i < string.length) {
        if(string[i] === "=" && i + 2 < string.length && string[i+1].match(/[0-9A-F]/) && string[i+2].match(/[0-9A-F]/)) {
            const hex = string.slice(i+1, i+3);
            bytes.push(parseInt(hex, 16));
            i += 2;
        } else if(string[i] === "=" && i + 1 < string.length && string[i+1] === "\n") {
            i += 1;
        } else if(string[i] === "=" && i + 2 < string.length && string[i+1] === "\r" && string[i+2] == "\n") {
            i += 2;
        } else {
            bytes.push(string.charCodeAt(i));
        }
        i++;
    }

    const byteArray = new Uint8Array(bytes);
    return byteArray;
}

// Take a based64 string and decode it to Uint8Array
function decodeBase64(string) {
    const bytes = [];
    var i=0;

    const bdata = atob(string);

    for(i=0;i<bdata.length;i++) {
        bytes.push(bdata.charCodeAt(i));
    }

    const byteArray = new Uint8Array(bytes);
    return byteArray;
}

// Take a unicode string and encode it to based64
function encodeBase64(string) {
    const encoder = new TextEncoder('utf-8');
    return btoa(String.fromCharCode( ...encoder.encode(string) ));
}

function encodeMIMEWords(string,method="B") {
    // only b64 cry about it
    return "=?UTF-8?B?" + encodeBase64(string) + "?=";
}

function wrap(string,length=78,hard=true,endl="\r\n") {
    return string
        .split(endl)
        .map((a) => {
            const match = a.matchAll(new RegExp('.{1,'+length.toString()+'}','gm'));
            if(match){
                return match.toArray().join(endl);
            } else {
                return a;
            }
        })
        .join(endl);
}

function decodeMIMEWords (string,escape_html=true) {
    if(!string) return null;
    const r = new RegExp(/=\?([0-9a-zA-Z-]+?)(?:\*.*?)?\?([QBqb])\?(.+?)\?=/);
    const rs = new RegExp(/\?=\s+=\?/,'g'); // idgaf
    const rg = new RegExp(r, 'g');
    const match_all = string.match(rg);

    const encoder = new TextEncoder();

    if(match_all) {
        string = string.replace(rs,'?==?');
        for(const result of match_all) {
            const [original, charset, method, encoded] = result.match(r);

            var i=0;
            var decoded;

            try {
                const decoder = new TextDecoder(charset);

                decoded = method.toUpperCase() === "Q" ?
                    decodeQuotedPrintable(encoded) :
                    decodeBase64(encoded);

                decoded = decoder.decode(decoded);

            } catch(e) {
                log('decodeMIMEWords','Decode error ' + e.message, WARN, [e,original,charset,method,encoded]);
                continue;
            }

            string = string.replace(original,decoded);
        }
    }
    if(escape_html) {
        return escapeHtml(string);
    } else {
        return string;
    }
}

function decodeDate(date, full=false) {
    if(typeof date !== "string" || date === "")
        return null;
    const decoded = new Date(date);
    const now = new Date();
    if(!decoded.getTime())
        return date;
    if(!full && Math.floor(decoded.getTime() / 86400000) === Math.floor(now.getTime() / 86400000))
        return decoded.toLocaleTimeString();
    else
        return decoded.toLocaleString();
}

function decodeSize(bytes) {
    var label = "byte" + (bytes === 1 ? '' : 's');

    if(bytes > 512) {
        label = "KB";
        bytes = bytes / 1024;
        if(bytes > 512) {
            label = "MB";
            bytes = bytes / 1024;
            if(bytes > 512) {
                label = "GB";
                bytes = bytes / 1024;
                if(bytes > 512) {
                    label = "TB";
                    bytes = bytes / 1024;
                    if(bytes > 1023) {
                        return "fuck off";
                    }
                }
            }
        }
    } else {
        return bytes + " " + label;
    }

    return bytes.toFixed(2).toString() + " " + label;
}

function escapeHtml (string,escapeChar="") {
    const entityMap = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;',
      "\\": '&bsol;',
      '/': '&#x2F;',
      '`': '&#x60;',
      '=': '&#x3D;'
    };
    if(escapeChar) {
        return String(string).replace(/[&<>"'`=\/\\]/g, "_");
    } else {
        return String(string).replace(/[&<>"'`=\/\\]/g, function (s) {
            return entityMap[s];
        });
    }
}

function escapeRegex(string) {
    return string.replace(/[/\-\\^$*+?.()|[\]{}]/g, '\\$&');
}

function escapePassword(string) {
    return string.replace(/[\"\\]/g, '\\$&');
}

function log(name,message,level=INFO,data) {
    const logitem = {
        date: new Date(),
        level: level,
        name: name,
        message: message,
        data: data
    };
    window.log_messages.push(logitem);

    if(log_messages.length > config.log_messages) log_messages.splice(0,1);

    if(level <= config.log_level_console) {
        switch(level) {
            case DEBUG:
            case NET:
                console.debug(logitem);
                break;
            case LOAD:
            case INFO:
                console.info(logitem);
                break;
            case WARN:
                console.warn(logitem);
                break;
            case ERR:
            case EMERG:
                console.error(logitem);
                console.error(logitem.data);
        }
    }

    window.dispatchEvent(new CustomEvent('log',{detail: logitem}));
}

const status_levels = {
    OK: INFO,
    LOAD: LOAD,
    ERR: ERR,
    DISC: ERR
};

}

async function set_status(status_message,ok="OK",data) {
    const exist_status = window.status_message || '';

    if(status_message === "OK" || status_message === "ERR") {
        ok = status_message;
        status_message = exist_status;
        if(ok === "OK") status_message += " Done!";
        if(ok === "ERR") status_message += " Error!";
    } else if(ok === "LOAD" && exist_status.slice(-3) !== '...') {
        status_message += "... ";
    }

    const status_level = status_levels[ok];
    const status_class = status_classes[ok];

    window.status_message = status_message;

    const $el = document.getElementById('status');
    const status_p = $el.querySelector('p');
    const status_data_label = $el.querySelector('label');
    const status_data_toggle = $el.querySelector('#status-data-toggle');
    const status_data = $el.querySelector('pre');
    const status_color = $el.querySelector('#status_color');

    log('status',status_message,status_level,data);

    status_p.innerText = status_message;
    status_color.setAttribute('class',status_class);

    if(status_message)
        $el.style.display = "block";
    else
        $el.style.display = "none";

    if(data) {
        status_data.innerText = data;
        status_data_label.classList.remove('hidden');
    } else {
        status_data_label.classList.add('hidden');
        status_data_toggle.checked = false;
        status_data.innerText = '';
    }
}

class View {
    constructor(template_name, el_before) {
        this.el = template(template_name);
        this.eventListeners = [];
        this.hide();

        if(el_before)
            el_before.before(this.el);
        else
            document.body.appendChild(this.el);
    }

    async open(draw=true) {
        this.show();
        if(draw)
            await this.draw();
    }

    async close() {
        for(const listener of this.eventListeners) {
            window.removeEventListener(...listener);
        }
        this.el.remove();
    }

    show() {
        this.el.classList.remove('hidden');
    }

    hide() {
        this.el.classList.add('hidden');
    }

    addEventListener(e,callback,options) {
        this.eventListeners.push([e,callback,options]);
        window.addEventListener(e,callback,options);
    }
}

    // Returns the container for the parent of the mailbox object, creating any necessary
    async getParent(mailbox) {
        const parent = mailbox.getParent();

        if(!parent) return this.mailbox_container;

        const parent_exist = parent in this.mailboxes;

        if(parent_exist) return this.mailboxes[parent];

        const parent_mailbox = this.imap.mailboxes[parent] ||
            new ImapMailbox(this.imap,this.imap.username,parent);

        if (!parent_exist) {
            this.imap.mailboxes[parent] = parent_mailbox;
            await parent_mailbox.init();
            parent_mailbox.flags = ['\\NonExistent'];
            parent_mailbox.delimiter = mailbox.delimiter;

            existing.mailbox = mailbox;
            existing.mailbox.onstatus = this.drawMailboxInfo.bind(this,existing.mailbox,existing);
            this.mailboxes[mailbox.mailbox].setAttribute('class',escapeHtml(mailbox.flags.join(' '),'_'));
            return existing;
        }

        const container = await this.getParent(mailbox);

        const existing_list = container.querySelector('.mailbox_list');

        const list = existing_list || template('account-mailbox-list');

        if(!existing_list)
            container.appendChild(list);

        const entry = template('account-mailbox');

        entry.mailbox = mailbox;
        entry.setAttribute('data-flags',escapeHtml(mailbox.flags.join(' '),'_'));
        entry.link.innerText = mailbox.getShortName();

        this.mailboxes[mailbox.mailbox] = entry;
        mailbox.onstatus = this.drawMailboxInfo.bind(this,mailbox,entry);

        list.appendChild(entry);

        return entry;
    }
